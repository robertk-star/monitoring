<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SaffHire Client Login</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#0f172a;min-height:100vh;display:grid;place-items:center;padding:24px}.card{background:#fff;border-radius:22px;max-width:440px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.35)}.top{background:#0f172a;color:#fff;padding:24px;border-bottom:5px solid #1fff00}.top h1{margin:0 0 6px}.top p{margin:0;color:#cbd5e1}form{padding:24px;display:grid;gap:16px}label{font-weight:900;color:#334155;display:grid;gap:7px}input{border:1px solid #cbd5e1;border-radius:13px;padding:12px;font-size:15px}button{border:1px solid #16a34a;background:#ecfdf5;color:#166534;border-radius:999px;padding:12px 15px;font-weight:1000;cursor:pointer}.row{display:flex;justify-content:space-between;align-items:center}.check{display:flex;gap:8px;align-items:center;color:#64748b}.check input{width:auto}.error{display:none;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:12px;border-radius:12px;font-weight:800}.small{padding:0 24px 24px;color:#64748b;font-size:13px}</style></head><body><div class="card"><div class="top"><h1>SaffHire Client Login</h1><p>Monitoring and Safety Performance access</p></div><form id="f"><div id="e" class="error"></div><label>Email / Username<input id="u" autocomplete="username" required></label><label>Password<input id="p" type="password" autocomplete="current-password" required></label><div class="row"><label class="check"><input id="r" type="checkbox"> Remember me</label><button id="b">Log In</button></div></form><div class="small">This page is for client users. SaffHire admins should use the normal admin login.</div></div><script>const f=document.getElementById('f'),e=document.getElementById('e'),b=document.getElementById('b');f.onsubmit=async ev=>{ev.preventDefault();e.style.display='none';b.disabled=true;b.textContent='Logging in...';try{const res=await fetch('/api/index?path='+encodeURIComponent('client-auth/login'),{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u.value,password:p.value,rememberMe:r.checked})});const raw=await res.text();let d={};try{d=raw?JSON.parse(raw):{}}catch{}if(!res.ok)throw new Error(d.message||'Login failed');location.href=d.redirect||'/client-portal.html'}catch(err){e.style.display='block';e.textContent=err.message}finally{b.disabled=false;b.textContent='Log In'}};</script></body></html>
