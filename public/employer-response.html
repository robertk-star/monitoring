<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safety Performance Response</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f8fafc; color: #0f172a; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 28px 16px 46px; }
    .card { background: #fff; border: 1px solid #dbe3ef; border-radius: 18px; box-shadow: 0 18px 48px rgba(15,23,42,.08); padding: 20px; }
    h1 { margin: 0 0 6px; font-size: 28px; }
    p { color: #475569; line-height: 1.5; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    label { display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 900; color: #334155; }
    input, select, textarea { border: 1px solid #cbd5e1; border-radius: 12px; padding: 10px 12px; font: inherit; color: #0f172a; background: #fff; }
    textarea { min-height: 88px; }
    .wide { grid-column: 1 / -1; }
    .checks { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 6px; }
    .check { display: flex; align-items: center; gap: 8px; border: 1px solid #dbe3ef; border-radius: 12px; padding: 10px; font-weight: 800; color: #334155; }
    .check input { width: auto; }
    button { border: 0; border-radius: 14px; padding: 12px 16px; background: #16a34a; color: #fff; font-weight: 1000; cursor: pointer; }
    .error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; padding: 12px; border-radius: 12px; margin: 14px 0; }
    .ok { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; padding: 12px; border-radius: 12px; margin: 14px 0; }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } .checks { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Safety Performance Response</h1>
      <p>Please complete the information below. This secure form saves directly back to SaffHire.</p>
      <div id="message"></div>
      <form id="form" style="display:none;">
        <div class="grid">
          <label>File Number<input name="fileNumber" readonly /></label>
          <label>Applicant<input name="applicantName" readonly /></label>
          <label>Previous Employer<input name="prevEmployerName" readonly /></label>
          <label>Was applicant employed by your company?
            <select name="employedByCompany"><option></option><option>Yes</option><option>No</option></select>
          </label>
          <label>Job Title<input name="jobTitle" /></label>
          <label>From Date<input name="fromDate" type="date" /></label>
          <label>To Date<input name="toDate" type="date" /></label>
          <label>Did they drive a motor vehicle?
            <select name="droveMotorVehicle"><option></option><option>Yes</option><option>No</option></select>
          </label>
          <div class="wide">
            <b>Vehicle Type</b>
            <div class="checks">
              <label class="check"><input type="checkbox" name="vehicleStraightTruck" /> Straight Truck</label>
              <label class="check"><input type="checkbox" name="vehicleTractorSemitrailer" /> Tractor/Semitrailer</label>
              <label class="check"><input type="checkbox" name="vehicleBus" /> Bus</label>
              <label class="check"><input type="checkbox" name="vehicleCargoTank" /> Cargo Tank</label>
              <label class="check"><input type="checkbox" name="vehicleDoublesTriples" /> Doubles/Triples</label>
              <label class="check"><input type="checkbox" name="vehicleOther" /> Other</label>
            </div>
          </div>
          <label class="wide">Accident History
            <select name="accidentHistory"><option></option><option>No accidents reported</option><option>Accidents reported below</option></select>
          </label>
          <label>Accident Date 1<input name="accidentDate1" type="date" /></label>
          <label>Accident Location 1<input name="accidentLocation1" /></label>
          <label>Injuries 1<input name="accidentInjuries1" /></label>
          <label>Fatalities 1<input name="accidentFatalities1" /></label>
          <label>Accident Date 2<input name="accidentDate2" type="date" /></label>
          <label>Accident Location 2<input name="accidentLocation2" /></label>
          <label>Injuries 2<input name="accidentInjuries2" /></label>
          <label>Fatalities 2<input name="accidentFatalities2" /></label>
          <label>Accident Date 3<input name="accidentDate3" type="date" /></label>
          <label>Accident Location 3<input name="accidentLocation3" /></label>
          <label>Injuries 3<input name="accidentInjuries3" /></label>
          <label>Fatalities 3<input name="accidentFatalities3" /></label>
          <label class="wide">Other Accident Details<textarea name="otherAccidents"></textarea></label>
          <div class="wide">
            <b>DOT Drug/Alcohol History</b>
            <div class="checks">
              <label class="check"><input type="checkbox" name="dotAlcoholTestPositive" /> Alcohol test positive</label>
              <label class="check"><input type="checkbox" name="dotDrugTestPositive" /> Drug test positive</label>
              <label class="check"><input type="checkbox" name="dotRefusedTest" /> Refused test</label>
              <label class="check"><input type="checkbox" name="dotOtherViolations" /> Other DOT violation</label>
            </div>
          </div>
          <label>Completed By<input name="infoReceivedFrom" /></label>
          <label>Date Completed<input name="infoReceivedDate" type="date" /></label>
          <label class="wide">Notes<textarea name="notes"></textarea></label>
        </div>
        <p><button type="submit">Submit Response</button></p>
      </form>
    </section>
  </main>
  <script>
    const token = new URLSearchParams(location.search).get('token') || '';
    const message = document.getElementById('message');
    const form = document.getElementById('form');

    function setMessage(html, cls) {
      message.innerHTML = '<div class="' + cls + '">' + html + '</div>';
    }

    async function api(url, options) {
      const response = await fetch(url, Object.assign({}, options || {}, { headers: { 'Content-Type': 'application/json' } }));
      const raw = await response.text();
      let data = {};
      try { data = raw ? JSON.parse(raw) : {}; } catch {}
      if (!response.ok) throw new Error(data.message || raw || 'Request failed');
      return data;
    }

    async function apiSafety(pathSuffix, options) {
      const newUrl = '/api/index?path=' + encodeURIComponent('safety-response') + pathSuffix;
      try {
        return await api(newUrl, options);
      } catch (firstError) {
        const oldUrl = '/api/safety-response' + pathSuffix.replace(/^&/, '?');
        try { return await api(oldUrl, options); } catch {}
        throw firstError;
      }
    }

    function fillForm(report) {
      Object.entries(report || {}).forEach(([key, value]) => {
        const field = form.elements[key];
        if (!field) return;
        if (field.type === 'checkbox') field.checked = Boolean(value);
        else field.value = value || '';
      });
    }

    async function load() {
      if (!token) throw new Error('Missing secure form token.');
      const data = await apiSafety('&token=' + encodeURIComponent(token));
      fillForm(data.report || {});
      form.style.display = '';
      setMessage('Form loaded. Please complete and submit below.', 'ok');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const body = { token };
      Array.from(new FormData(form).entries()).forEach(([key, value]) => body[key] = value);
      Array.from(form.querySelectorAll('input[type="checkbox"]')).forEach((input) => body[input.name] = input.checked);
      await apiSafety('', { method: 'POST', body: JSON.stringify(body) });
      form.style.display = 'none';
      setMessage('Thank you. Your response has been submitted.', 'ok');
    });

    load().catch((error) => {
      setMessage(error.message || 'Could not load this form.', 'error');
    });
  </script>
</body>
</html>
