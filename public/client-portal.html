<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SaffHire Client Portal</title><style>:root{--g:#1fff00;--ink:#0f172a;--muted:#64748b;--line:#dbe3ef;--bg:#f8fafc}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--ink)}.layout{min-height:100vh;display:grid;grid-template-columns:260px 1fr}aside{background:#0f172a;color:#fff;padding:22px 14px}.brand{padding:0 10px 18px;border-bottom:1px solid rgba(255,255,255,.14);margin-bottom:16px}.brand h1{margin:0}.brand p{margin:4px 0 0;color:#cbd5e1}nav button{width:100%;border:0;border-radius:13px;color:#e2e8f0;background:transparent;padding:11px;text-align:left;font-weight:900;cursor:pointer;margin:4px 0}nav button.active,nav button:hover{background:rgba(31,255,0,.16);box-shadow:inset 4px 0 0 var(--g);color:#fff}main{padding:24px}.head{display:flex;justify-content:space-between;gap:12px;margin-bottom:18px}.head h2{margin:0 0 4px;font-size:28px}.head p{margin:0;color:var(--muted);font-weight:700}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 8px 24px rgba(15,23,42,.05)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}.metric b{display:block;font-size:28px}.metric span{color:var(--muted);font-weight:800}.table{overflow:auto;border:1px solid var(--line);border-radius:15px}table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:10px;border-bottom:1px solid #e2e8f0;text-align:left;vertical-align:middle}th{background:#f8fafc;color:#475569;text-transform:uppercase;font-size:12px}select,textarea{border:1px solid #cbd5e1;border-radius:10px;padding:8px;font:inherit}textarea{width:260px;min-height:54px}select.on{border-color:var(--g);background:rgba(31,255,0,.16);font-weight:1000}tr.dirty td{background:#fffbeb}.btn{border:1px solid #16a34a;background:#ecfdf5;color:#166534;border-radius:999px;padding:9px 12px;font-weight:1000;cursor:pointer}.danger{border-color:#dc2626;background:#fef2f2;color:#991b1b}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:#fff;border-radius:12px;padding:12px 14px}.toast.bad{background:#991b1b}@media(max-width:860px){.layout{grid-template-columns:1fr}nav{display:flex;overflow:auto;gap:8px}nav button{white-space:nowrap}}</style></head><body><div class="layout"><aside><div class="brand"><h1>SaffHire</h1><p id="name">Client Portal</p></div><nav><button data-p="dash" class="active">Dashboard</button><button data-p="mon">Monitoring</button><button data-p="safe">Safety Performance</button></nav></aside><main><div id="app" class="card">Loading client portal...</div></main></div><script>let S={p:'dash',d:null};const A=document.getElementById('app');function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}function fmt(v){if(!v)return'';const d=new Date(v);return Number.isNaN(d.getTime())?String(v):d.toLocaleDateString()}function ep(p){return'/api/index?path='+encodeURIComponent(p)}async function api(p,o){const r=await fetch(ep(p),Object.assign({credentials:'include'},o||{},{headers:Object.assign({'Content-Type':'application/json'},(o&&o.headers)||{})}));const raw=await r.text();let d={};try{d=raw?JSON.parse(raw):{}}catch{}if(!r.ok)throw new Error(d.message||raw||'Request failed');return d}function toast(m,b){let t=document.createElement('div');t.className=b?'toast bad':'toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3500)}function head(t,s){return`<div class=head><div><h2>${esc(t)}</h2><p>${esc(s||'')}</p></div><div><button class=btn onclick=load()>Refresh</button> <button class='btn danger' onclick=logout()>Logout</button></div></div>`}function metric(l,v){return`<div class='card metric'><b>${esc(v??0)}</b><span>${esc(l)}</span></div>`}async function boot(){try{await api('client-auth/me');await load()}catch(e){location.href='/client-login.html'}}async function load(){A.innerHTML='Loading...';try{S.d=await api('client-dashboard');document.getElementById('name').textContent=S.d.company?.name||'Client Portal';render()}catch(e){A.className='card';A.textContent=e.message}}async function logout(){await api('client-auth/logout',{method:'POST',body:'{}'}).catch(()=>{});location.href='/client-login.html'}function render(){document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.p===S.p));if(S.p==='mon')return mon();if(S.p==='safe')return safe();dash()}function dash(){let d=S.d||{},a=d.applicantStats||{},s=d.safetyStats||{};A.className='';A.innerHTML=head('Dashboard',d.company?.name||'')+`<div class=grid>${metric('Total Monitoring',a.total)}${metric('On Monitoring',a.on_monitoring)}${metric('Off Monitoring',a.off_monitoring)}${metric('Expired Medical',a.expired_medical)}${metric('Safety Reports',s.total)}${metric('Completed Safety',s.completed)}</div><section class=card><h3>Recent Monitoring</h3>${monTable((d.recentApplicants||[]).slice(0,10),false)}</section><section class=card><h3>Recent Safety Performance</h3>${safeTable((d.recentSafetyReports||[]).slice(0,10))}</section>`}function monTable(rows,edit){if(!rows.length)return'<p>No monitoring records found.</p>';return`<div class=table><table><thead><tr><th>File #</th><th>Name</th><th>Order Date</th><th>Monitoring</th><th>MVR Status</th><th>Med Expire</th><th>Notes</th>${edit?'<th>Save</th>':''}</tr></thead><tbody>${rows.map(r=>`<tr data-id='${esc(r.id)}'><td><b>${esc(r.fileNumber)}</b></td><td>${esc(r.name)}</td><td>${esc(fmt(r.orderDate))}</td><td>${edit?`<select data-f=monitorStatus class='${r.monitorStatus==='On'?'on':''}'><option value=Off ${r.monitorStatus!=='On'?'selected':''}>Off</option><option value=On ${r.monitorStatus==='On'?'selected':''}>On</option></select>`:esc(r.monitorStatus)}</td><td>${esc(r.mvrStatus)}</td><td>${esc(r.medExpire)}</td><td>${edit?`<textarea data-f=notes>${esc(r.notes||'')}</textarea>`:esc(r.notes)}</td>${edit?'<td><button class=btn data-a=save>Save</button></td>':''}</tr>`).join('')}</tbody></table></div>`}function mon(){let rows=S.d?.recentApplicants||[];A.className='';A.innerHTML=head('Monitoring','Turn Monitoring On/Off and save notes.')+`<section class=card><button class=btn onclick=saveAll()>Save All Changed</button><br><br>${monTable(rows,true)}</section>`;document.querySelectorAll('[data-id]').forEach(row=>{row.querySelectorAll('select,textarea').forEach(el=>el.addEventListener('change',()=>row.classList.add('dirty')));row.querySelector('[data-a=save]')?.addEventListener('click',()=>saveRow(row))})}async function saveRow(row){let b=row.querySelector('[data-a=save]');let old=b.textContent;b.disabled=true;b.textContent='Saving...';try{await api('client-applicant',{method:'PATCH',body:JSON.stringify({id:row.dataset.id,monitorStatus:row.querySelector('[data-f=monitorStatus]').value,notes:row.querySelector('[data-f=notes]').value})});row.classList.remove('dirty');row.querySelector('select').classList.toggle('on',row.querySelector('select').value==='On');toast('Saved.')}catch(e){toast(e.message,true)}finally{b.disabled=false;b.textContent=old}}async function saveAll(){let rows=[...document.querySelectorAll('tr.dirty[data-id]')];if(!rows.length)return toast('No changes to save.');for(const r of rows)await saveRow(r);await load()}function safeTable(rows){if(!rows.length)return'<p>No safety reports found.</p>';return`<div class=table><table><thead><tr><th>File #</th><th>Applicant</th><th>Created</th><th>Status</th><th>Follow Up</th><th>Previous Employer</th><th>Notes</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.fileNumber)}</td><td>${esc(r.applicantName)}</td><td>${esc(fmt(r.created))}</td><td>${esc(r.status)}</td><td>${esc(r.followUpDate)}</td><td>${esc(r.prevEmployerName)}</td><td>${esc(r.notes)}</td></tr>`).join('')}</tbody></table></div>`}function safe(){A.className='';A.innerHTML=head('Safety Performance','Read-only Safety Performance reports.')+`<section class=card>${safeTable(S.d?.recentSafetyReports||[])}</section>`}document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{S.p=b.dataset.p;render()});boot();</script>
<script>
// Phase 12A-36: Client Portal Monitoring header sort
(function(){
  let sort={index:-1,direction:'asc',type:'text'};
  const HEADERS=[
    ['File #','number'],
    ['Name','text'],
    ['Order Date','date'],
    ['Monitoring','text'],
    ['MVR Status','text'],
    ['Med Expire','date'],
    ['Notes','text']
  ];
  function text(el){return(el&&el.textContent?el.textContent:'').trim()}
  function norm(v){return String(v||'').replace(/[↕↑↓]/g,'').replace(/\s+/g,' ').trim().toLowerCase()}
  function activePage(){const b=[...document.querySelectorAll('nav button')].find(x=>x.classList.contains('active'));return b?b.dataset.p:''}
  function isMonitoring(){return activePage()==='mon'||text(document.querySelector('.head h2'))==='Monitoring'}
  function getTable(){
    if(!isMonitoring())return null;
    return [...document.querySelectorAll('table')].find(t=>{
      const h=[...t.querySelectorAll('thead th')].map(th=>norm(text(th)));
      return h.includes('file #')&&h.includes('name')&&h.includes('monitoring')&&h.includes('med expire');
    })||null;
  }
  function val(row,i,type){
    const c=row.children[i]; if(!c)return'';
    const s=c.querySelector('select'); if(s)return s.value||'';
    const ta=c.querySelector('textarea'); if(ta)return ta.value||'';
    const input=c.querySelector('input'); if(input)return input.value||'';
    const raw=text(c);
    if(type==='number'){const n=Number(String(raw).replace(/[^0-9.-]/g,''));return Number.isNaN(n)?raw.toLowerCase():n}
    if(type==='date'){if(!raw)return 0;const d=new Date(raw);return Number.isNaN(d.getTime())?raw.toLowerCase():d.getTime()}
    return raw.toLowerCase();
  }
  function cmp(a,b){if(typeof a==='number'&&typeof b==='number')return a-b;return String(a).localeCompare(String(b),undefined,{numeric:true,sensitivity:'base'})}
  function updateIcons(t){
    [...t.querySelectorAll('[data-phase12a36-icon]')].forEach((ic,idx)=>{
      ic.textContent=idx===sort.index?(sort.direction==='asc'?'↑':'↓'):'↕';
      ic.classList.toggle('active',idx===sort.index);
    });
  }
  function sortTable(t,i,type){
    const tb=t.querySelector('tbody'); if(!tb)return;
    const rows=[...tb.querySelectorAll('tr')].filter(r=>r.children.length>i);
    sort={index:i,type,direction:sort.index===i&&sort.direction==='asc'?'desc':'asc'};
    rows.sort((a,b)=>{const r=cmp(val(a,i,type),val(b,i,type));return sort.direction==='asc'?r:-r});
    rows.forEach(r=>tb.appendChild(r));
    updateIcons(t);
  }
  function enhance(){
    const t=getTable();
    if(!t||t.dataset.phase12a36Sort==='1')return;
    [...t.querySelectorAll('thead th')].forEach((th,i)=>{
      const clean=norm(text(th));
      const cfg=HEADERS.find(h=>h[0].toLowerCase()===clean);
      if(!cfg)return;
      th.innerHTML='<button type="button" class="phase12a36-sort-head"><span>'+cfg[0]+'</span><span data-phase12a36-icon>↕</span></button>';
      th.querySelector('button').onclick=e=>{e.preventDefault();e.stopPropagation();sortTable(t,i,cfg[1])};
    });
    t.dataset.phase12a36Sort='1';
  }
  function style(){
    if(document.getElementById('phase12a36-client-sort-style'))return;
    const s=document.createElement('style');
    s.id='phase12a36-client-sort-style';
    s.textContent='.phase12a36-sort-head{width:100%;border:0;background:transparent;color:inherit;display:flex;justify-content:space-between;gap:8px;padding:0;font:inherit;font-weight:1000;text-transform:inherit;cursor:pointer}.phase12a36-sort-head:hover{color:#166534}[data-phase12a36-icon]{color:#94a3b8}[data-phase12a36-icon].active{color:#16a34a;font-weight:1000}';
    document.head.appendChild(s);
  }
  function boot(){style();enhance();setInterval(enhance,700)}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
</script>


<script>
// Phase 12A-38: Client Monitoring Alerts Header
(function(){
  let activeFilter = 'all';

  function text(el){ return (el && el.textContent ? el.textContent : '').trim(); }
  function activePage(){ const b=[...document.querySelectorAll('nav button')].find(x=>x.classList.contains('active')); return b ? b.dataset.p : ''; }
  function isMonitoring(){ return activePage()==='mon' || text(document.querySelector('.head h2'))==='Monitoring'; }

  function getMonitoringTable(){
    if(!isMonitoring()) return null;
    return [...document.querySelectorAll('table')].find(t=>{
      const h=[...t.querySelectorAll('thead th')].map(th=>text(th).replace(/[↕↑↓]/g,'').trim().toLowerCase());
      return h.includes('file #') && h.includes('monitoring') && h.includes('med expire');
    }) || null;
  }

  function rows(){
    const t=getMonitoringTable();
    if(!t) return [];
    return [...t.querySelectorAll('tbody tr')].filter(r=>r.children.length>=7);
  }

  function cell(row,index){
    const c=row.children[index];
    if(!c) return '';
    const s=c.querySelector('select'); if(s) return s.value || '';
    const ta=c.querySelector('textarea'); if(ta) return ta.value || '';
    const inp=c.querySelector('input'); if(inp) return inp.value || '';
    return text(c);
  }

  function parseDate(raw){
    const s=String(raw||'').trim();
    if(!s) return null;
    let m=s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
    if(m) return new Date(Number(m[1]),Number(m[2])-1,Number(m[3]));
    m=s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{2,4})$/);
    if(m){ const y=m[3].length===2?Number('20'+m[3]):Number(m[3]); return new Date(y,Number(m[1])-1,Number(m[2])); }
    const d=new Date(s);
    return Number.isNaN(d.getTime())?null:new Date(d.getFullYear(),d.getMonth(),d.getDate());
  }

  function today(){
    const d=new Date();
    return new Date(d.getFullYear(),d.getMonth(),d.getDate());
  }

  function rowData(row){
    const med=cell(row,5);
    const medDate=parseDate(med);
    const days=medDate?Math.ceil((medDate.getTime()-today().getTime())/86400000):null;
    return {
      fileNumber: cell(row,0),
      name: cell(row,1),
      orderDate: cell(row,2),
      monitoring: cell(row,3),
      mvrStatus: cell(row,4),
      medExpire: med,
      medDate,
      medDays: days,
      notes: cell(row,6)
    };
  }

  function state(row){
    const d=rowData(row);
    if(d.monitoring !== 'On') return 'off';
    if(!d.medDate) return 'blank';
    if(d.medDays < 0) return 'expired';
    if(d.medDays <= 30) return 'exp30';
    if(d.medDays <= 60) return 'exp60';
    if(/pending|review|needed|expired|attention/i.test(d.mvrStatus||'')) return 'mvr';
    return 'ok';
  }

  function counts(){
    const out={total:0,on:0,off:0,expired:0,exp30:0,exp60:0,blank:0,mvr:0};
    rows().forEach(row=>{
      if(isTerminatedRow(row)) return;
      const d=rowData(row), s=state(row);
      out.total++;
      if(d.monitoring==='On') out.on++; else out.off++;
      if(s==='expired') out.expired++;
      if(s==='exp30') out.exp30++;
      if(s==='exp60') out.exp60++;
      if(s==='blank') out.blank++;
      if(s==='mvr') out.mvr++;
    });
    return out;
  }

  function shouldShow(row){
    if(isTerminatedRow(row)) return false;
    const d=rowData(row), s=state(row);
    if(activeFilter==='all') return true;
    if(activeFilter==='on') return d.monitoring==='On';
    if(activeFilter==='off') return d.monitoring!=='On';
    if(activeFilter==='expired') return s==='expired';
    if(activeFilter==='exp30') return s==='exp30';
    if(activeFilter==='exp60') return s==='exp60';
    if(activeFilter==='blank') return s==='blank';
    if(activeFilter==='mvr') return s==='mvr';
    return true;
  }

  function updateRowVisibility(){
    rows().forEach(row=>{ row.style.display=shouldShow(row)?'':'none'; });
  }

  function getPanel(){
    return document.getElementById('client-monitoring-alerts');
  }

  function metricHtml(key,value,label){
    return `<button type="button" class="client-alert-card ${activeFilter===key?'active':''}" data-client-alert-filter="${key}"><b>${value}</b><span>${label}</span></button>`;
  }

  function renderPanel(){
    const c=counts();
    const panel=getPanel();
    if(!panel) return;

    panel.innerHTML=`
      <h3>Monitoring Alerts</h3>
      <div class="client-alert-grid">
        ${metricHtml('all',c.total,'Total')}
        ${metricHtml('on',c.on,'On Monitoring')}
        ${metricHtml('off',c.off,'Off Monitoring')}
        ${metricHtml('expired',c.expired,'Expired Medical')}
        ${metricHtml('exp30',c.exp30,'Expiring 30 Days')}
        ${metricHtml('exp60',c.exp60,'Expiring 60 Days')}
        ${metricHtml('blank',c.blank,'Blank Med Expire')}
        ${metricHtml('mvr',c.mvr,'MVR Attention')}
      </div>
      <div class="client-alert-actions">
        <button type="button" id="client-copy-summary">Copy Summary</button>
        <button type="button" id="client-download-csv">Download Current View CSV</button>
        <button type="button" id="client-recalculate-alerts">Recalculate Alerts</button>
      </div>
      <p class="client-alert-help">Click an alert card to filter the visible Monitoring records. Click the same card again by choosing Total to show all.</p>
    `;

    panel.querySelectorAll('[data-client-alert-filter]').forEach(btn=>{
      btn.onclick=()=>{
        activeFilter=btn.dataset.clientAlertFilter || 'all';
        renderPanel();
        updateRowVisibility();
      };
    });

    panel.querySelector('#client-copy-summary').onclick=copySummary;
    panel.querySelector('#client-download-csv').onclick=downloadCsv;
    panel.querySelector('#client-recalculate-alerts').onclick=()=>{ renderPanel(); updateRowVisibility(); };
  }

  function ensurePanel(){
    if(!isMonitoring()){
      document.getElementById('client-monitoring-alerts')?.remove();
      return;
    }

    const t=getMonitoringTable();
    if(!t) return;

    if(!getPanel()){
      const section=t.closest('section.card,.card') || t.parentElement;
      const panel=document.createElement('section');
      panel.id='client-monitoring-alerts';
      panel.className='card client-monitoring-alerts';
      section.parentElement.insertBefore(panel,section);
    }

    renderPanel();
    updateRowVisibility();
  }

  function visibleRows(){
    return rows().filter(r=>r.style.display !== 'none' && !isTerminatedRow(r));
  }

  function csvEscape(value){
    const s=String(value??'');
    return /[",\n]/.test(s)?`"${s.replaceAll('"','""')}"`:s;
  }

  function downloadCsv(){
    const header=['File #','Name','Order Date','Monitoring','MVR Status','Med Expire','Notes'];
    const lines=[header.map(csvEscape).join(',')];
    visibleRows().forEach(row=>{
      const d=rowData(row);
      lines.push([d.fileNumber,d.name,d.orderDate,d.monitoring,d.mvrStatus,d.medExpire,d.notes].map(csvEscape).join(','));
    });
    const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='client-monitoring-current-view.csv';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  async function copySummary(){
    const c=counts();
    const summary=[
      `Monitoring Summary`,
      `Total: ${c.total}`,
      `On Monitoring: ${c.on}`,
      `Off Monitoring: ${c.off}`,
      `Expired Medical: ${c.expired}`,
      `Expiring 30 Days: ${c.exp30}`,
      `Expiring 60 Days: ${c.exp60}`,
      `Blank Med Expire: ${c.blank}`,
      `MVR Attention: ${c.mvr}`
    ].join('\n');

    try{
      await navigator.clipboard.writeText(summary);
      toast('Summary copied.');
    }catch{
      prompt('Copy summary:',summary);
    }
  }

  function toast(message){
    let box=document.getElementById('client-alert-toast');
    if(!box){
      box=document.createElement('div');
      box.id='client-alert-toast';
      document.body.appendChild(box);
    }
    box.textContent=message;
    clearTimeout(box.t);
    box.t=setTimeout(()=>box.remove(),3000);
  }

  function addStyles(){
    if(document.getElementById('client-monitoring-alert-styles')) return;
    const style=document.createElement('style');
    style.id='client-monitoring-alert-styles';
    style.textContent=`
      .client-monitoring-alerts {
        border-left: 5px solid #38bdf8;
      }
      .client-monitoring-alerts h3 {
        margin: 0 0 10px;
      }
      .client-alert-grid {
        display: grid;
        grid-template-columns: repeat(4,minmax(160px,1fr));
        gap: 10px;
      }
      .client-alert-card {
        text-align: left;
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 12px;
        padding: 10px 12px;
        color: #0f172a;
        cursor: pointer;
      }
      .client-alert-card b {
        display: block;
        font-size: 24px;
        line-height: 1;
      }
      .client-alert-card span {
        display: block;
        margin-top: 4px;
        font-weight: 900;
      }
      .client-alert-card.active {
        border-color: #1fff00;
        background: rgba(31,255,0,.16);
      }
      .client-alert-actions {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .client-alert-actions button {
        border: 1px solid #38bdf8;
        color: #075985;
        background: #f0f9ff;
        border-radius: 999px;
        padding: 8px 11px;
        font-weight: 1000;
        cursor: pointer;
      }
      .client-alert-help {
        margin: 10px 0 0;
        color: #64748b;
        font-weight: 700;
      }
      #client-alert-toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 80;
        background: #111827;
        color: #fff;
        border-radius: 12px;
        padding: 12px 14px;
        box-shadow: 0 18px 45px rgba(15,23,42,.25);
      }
      @media(max-width:900px){
        .client-alert-grid{ grid-template-columns: repeat(2,minmax(150px,1fr)); }
      }
    `;
    document.head.appendChild(style);
  }

  function boot(){
    addStyles();
    ensurePanel();
    setInterval(ensurePanel,900);
    document.addEventListener('change',()=>setTimeout(()=>{renderPanel();updateRowVisibility();},100),true);
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);
  else boot();
})();
</script>


<script>
// Phase 12A-40: Client completed Safety Performance PDF download
(function(){

    const indexes = headerIndexes(table);

// Phase 12A-44: Stable Monitoring search by file number or name
(function () {
  let searchValue = '';

  function text(el) {
    return (el && el.textContent ? el.textContent : '').trim();
  }

  function currentTitle() {
    return text(document.querySelector('.page-header h1')) || text(document.querySelector('.head h2'));

  function activePortalPage() {
    const active = Array.from(document.querySelectorAll('nav button')).find((button) => button.classList.contains('active'));

  }

  function isMonitoringContext() {
    const title = currentTitle();
    return title === 'Monitoring' || activePortalPage() === 'mon' || title === 'Client View';
  }

  function normalizeHeader(value) {
    return String(value || '')
      .replace(/[↕↑↓▲▼]/g, '')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();
  }

  function findMonitoringTables() {
    if (!isMonitoringContext()) return [];

    return Array.from(document.querySelectorAll('table')).filter((table) => {
      const headers = Array.from(table.querySelectorAll('thead th')).map((th) => normalizeHeader(text(th)));
      return headers.includes('file #') &&
        headers.includes('name') &&
        (headers.includes('monitoring') || headers.includes('monitor status')) &&
        headers.includes('med expire');
    });
  }

  function getIndexes(table) {
    const headers = Array.from(table.querySelectorAll('thead th')).map((th) => normalizeHeader(text(th)));
    return {
      file: headers.indexOf('file #'),
      name: headers.includes('name') ? headers.indexOf('name') : headers.indexOf('applicant name')
    };
  }

  function rowSearchText(row, indexes) {
    const fileText = indexes.file >= 0 && row.children[indexes.file] ? text(row.children[indexes.file]) : '';
    const nameText = indexes.name >= 0 && row.children[indexes.name] ? text(row.children[indexes.name]) : '';
    return `${fileText} ${nameText}`.toLowerCase();
  }

  function applyFilter(table) {
    const indexes = getIndexes(table);
    const query = searchValue.trim().toLowerCase();
    let visible = 0;

    Array.from(table.querySelectorAll('tbody tr')).forEach((row) => {
      const show = !query || rowSearchText(row, indexes).includes(query);

      if (show) {
        row.removeAttribute('data-phase12a44-search-hidden');
        visible++;
      } else {
        row.setAttribute('data-phase12a44-search-hidden', '1');
      }
    });

    const count = document.querySelector('[data-phase12a44-count]');
    if (count) count.textContent = `${visible} visible`;
  }

  function applyAllFilters() {
    findMonitoringTables().forEach(applyFilter);
  }

  function ensureSearchBox() {
    const tables = findMonitoringTables();

    if (!tables.length) {
      document.querySelectorAll('[data-phase12a44-search-wrap]').forEach((el) => el.remove());
      return;
    }

    const table = tables[0];

    if (document.querySelector('[data-phase12a44-search-wrap]')) {
      applyAllFilters();
      return;
    }

    const container = table.closest('.table-wrap, .phase12a24-table-wrap, .card, section') || table.parentElement;
    if (!container || !container.parentElement) return;

    const wrap = document.createElement('div');
    wrap.className = 'phase12a44-search-wrap';
    wrap.setAttribute('data-phase12a44-search-wrap', '1');
    wrap.innerHTML = `
      <div class="phase12a44-search-box">
        <strong>Search</strong>
        <input data-phase12a44-search type="search" placeholder="Search by file number or name..." />
        <button type="button" data-phase12a44-clear>Clear</button>
        <span data-phase12a44-count></span>
      </div>
    `;

    container.parentElement.insertBefore(wrap, container);

    const input = wrap.querySelector('[data-phase12a44-search]');
    const clear = wrap.querySelector('[data-phase12a44-clear]');

    input.value = searchValue;

    input.addEventListener('input', () => {
      searchValue = input.value || '';
      applyAllFilters();
    });

    clear.addEventListener('click', () => {
      searchValue = '';
      input.value = '';
      applyAllFilters();
      input.focus();
    });

    applyAllFilters();
  }

  function addStyles() {
    if (document.getElementById('phase12a44-search-style')) return;

    const style = document.createElement('style');
    style.id = 'phase12a44-search-style';
    style.textContent = `
      tr[data-phase12a44-search-hidden="1"] {
        display: none !important;
      }

      .phase12a44-search-wrap {
        margin: 0 0 12px;
      }

      .phase12a44-search-box {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        border: 1px solid #dbe3ef;
        background: #fff;
        border-radius: 16px;
        padding: 12px;
      }

      .phase12a44-search-box strong {
        color: #475569;
        font-weight: 1000;
      }

      .phase12a44-search-box input {
        flex: 1;
        min-width: 240px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
      }

      .phase12a44-search-box button {
        border: 1px solid #38bdf8;
        background: #f0f9ff;
        color: #075985;
        border-radius: 999px;
        padding: 8px 11px;
        font-weight: 1000;
        cursor: pointer;
      }

      .phase12a44-search-box span {
        color: #166534;
        font-size: 13px;
        font-weight: 900;
      }
    `;

    document.head.appendChild(style);
  }

  function boot() {
    addStyles();
    ensureSearchBox();

    // Only ensure the search box exists on page/table changes.
    // The hidden row state is controlled by CSS, so it will not flash.
    setInterval(() => {
      ensureSearchBox();
      applyAllFilters();
    }, 1000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();

</script>
<script>

// Phase 12A-45: Terminated checkbox column
(function () {
  let applicantMap = new Map();
  let lastFetchAt = 0;

  function text(el) {
    return (el && el.textContent ? el.textContent : '').trim();
  }

  function normalize(value) {
    return String(value || '')
      .replace(/[↕↑↓▲▼]/g, '')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();
  }

  function currentTitle() {
    return text(document.querySelector('.page-header h1')) || text(document.querySelector('.head h2'));
  }

  function activePortalPage() {
    const active = Array.from(document.querySelectorAll('nav button')).find((button) => button.classList.contains('active'));
    return active ? active.dataset.p : '';
  }

  function isPortal() {
    return location.pathname.includes('client-portal');
  }

  function isMonitoringContext() {
    const title = currentTitle();
    return title === 'Monitoring' || activePortalPage() === 'mon' || title === 'Client View';
  }

  function endpoint(path) {
    return '/api/index?path=' + encodeURIComponent(path);
  }

  async function refreshApplicantMap(force) {
    const now = Date.now();
    if (!force && now - lastFetchAt < 5000 && applicantMap.size) return;
    lastFetchAt = now;

    try {
      const path = isPortal() ? 'client-dashboard' : 'applicants';
      const res = await fetch(endpoint(path), { credentials: 'include' });
      const raw = await res.text();
      let data = {};
      try { data = raw ? JSON.parse(raw) : {}; } catch {}
      if (!res.ok) return;

      const rows = isPortal() ? (data.recentApplicants || []) : (data.applicants || []);
      applicantMap = new Map();
      rows.forEach((row) => {
        const file = String(row.fileNumber || '').trim();
        if (!file) return;
        applicantMap.set(file, {
          id: row.id,
          terminated: Boolean(row.terminated)
        });
      });
    } catch {}
  }

  function findMonitoringTables() {
    if (!isMonitoringContext()) return [];
    return Array.from(document.querySelectorAll('table')).filter((table) => {
      const headers = Array.from(table.querySelectorAll('thead th')).map((th) => normalize(text(th)));
      return headers.includes('file #') &&
        headers.includes('notes') &&
        (headers.includes('monitoring') || headers.includes('monitor status')) &&
        headers.includes('med expire');
    });
  }

  function indexes(table) {
    const headers = Array.from(table.querySelectorAll('thead th')).map((th) => normalize(text(th)));
    return {
      file: headers.indexOf('file #'),
      notes: headers.indexOf('notes'),
      save: headers.indexOf('save'),
      terminated: headers.indexOf('terminated')
    };
  }

  function fileNumber(row, fileIndex) {
    const raw = fileIndex >= 0 && row.children[fileIndex] ? text(row.children[fileIndex]) : '';
    const match = raw.match(/[0-9]+/);
    return match ? match[0] : '';
  }

  function insertCell(row, index, cell) {
    if (index >= row.children.length) row.appendChild(cell);
    else row.insertBefore(cell, row.children[index]);
  }

  async function saveTerminated(file, checked, checkbox) {
    const found = applicantMap.get(file);
    if (!found || !found.id) {
      await refreshApplicantMap(true);
    }

    const row = applicantMap.get(file);
    if (!row || !row.id) {
      alert('Could not find applicant id for file ' + file);
      checkbox.checked = !checked;
      return;
    }

    checkbox.disabled = true;

    try {
      const path = isPortal() ? 'client-applicant' : 'applicants';
      const res = await fetch(endpoint(path), {
        method: 'PATCH',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: row.id, terminated: checked })
      });

      const raw = await res.text();
      let data = {};
      try { data = raw ? JSON.parse(raw) : {}; } catch {}
      if (!res.ok) throw new Error(data.message || raw || 'Could not save terminated flag');

      row.terminated = checked;
      applicantMap.set(file, row);
      checkbox.closest('tr')?.classList.toggle('phase12a45-terminated-row', checked);
    } catch (error) {
      alert(error.message || 'Could not save terminated flag');
      checkbox.checked = !checked;
    } finally {
      checkbox.disabled = false;
    }
  }

  function enhanceTable(table) {
    const idx = indexes(table);
    if (idx.file < 0 || idx.notes < 0) return;

    let insertIndex = idx.notes + 1;

    if (idx.terminated < 0) {
      const headerRow = table.querySelector('thead tr');
      const th = document.createElement('th');
      th.textContent = 'Terminated';
      th.className = 'phase12a45-terminated-header';
      insertCell(headerRow, insertIndex, th);
    } else {
      insertIndex = idx.terminated;
    }

    const fresh = indexes(table);

    Array.from(table.querySelectorAll('tbody tr')).forEach((row) => {
      const file = fileNumber(row, fresh.file);
      if (!file) return;

      if (row.querySelector('[data-phase12a45-terminated]')) {
        const cb = row.querySelector('[data-phase12a45-terminated]');
        const found = applicantMap.get(file);
        if (found) {
          cb.checked = Boolean(found.terminated);
          row.classList.toggle('phase12a45-terminated-row', Boolean(found.terminated));
        }
        return;
      }

      const td = document.createElement('td');
      td.className = 'phase12a45-terminated-cell';

      const label = document.createElement('label');
      label.className = 'phase12a45-terminated-label';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.setAttribute('data-phase12a45-terminated', '1');

      const found = applicantMap.get(file);
      checkbox.checked = Boolean(found?.terminated);
      row.classList.toggle('phase12a45-terminated-row', Boolean(found?.terminated));

      const span = document.createElement('span');
      span.textContent = 'Terminated';

      label.appendChild(checkbox);
      label.appendChild(span);
      td.appendChild(label);

      checkbox.addEventListener('change', () => {
        saveTerminated(file, checkbox.checked, checkbox);
      });

      insertCell(row, fresh.terminated >= 0 ? fresh.terminated : insertIndex, td);
    });
  }

  async function refresh() {
    const tables = findMonitoringTables();
    if (!tables.length) return;
    await refreshApplicantMap(false);
    tables.forEach(enhanceTable);
  }

  function addStyles() {
    if (document.getElementById('phase12a45-terminated-style')) return;

    const style = document.createElement('style');
    style.id = 'phase12a45-terminated-style';

<script>

// Phase 12A-47: Terminated notes + alert count fix
(function () {
  function text(el) {
    return (el && el.textContent ? el.textContent : '').trim();
  }

  function currentTitle() {
    return text(document.querySelector('.page-header h1')) || text(document.querySelector('.head h2'));
  }

  function activePortalPage() {
    const active = Array.from(document.querySelectorAll('nav button')).find((button) => button.classList.contains('active'));
    return active ? active.dataset.p : '';
  }

  function isPortal() {
    return location.pathname.includes('client-portal');
  }

  function isMonitoringContext() {
    const title = currentTitle();
    return title === 'Monitoring' || title === 'Client View' || activePortalPage() === 'mon';
  }

  function endpoint(path) {
    return '/api/index?path=' + encodeURIComponent(path);
  }

  async function api(path, options) {
    const res = await fetch(endpoint(path), Object.assign({ credentials: 'include' }, options || {}, {
      headers: Object.assign({ 'Content-Type': 'application/json' }, (options && options.headers) || {})
    }));
    const raw = await res.text();
    let data = {};
    try { data = raw ? JSON.parse(raw) : {}; } catch {}
    if (!res.ok) throw new Error(data.message || raw || 'Request failed');
    return data;
  }

  function normalizeHeader(value) {
    return String(value || '')
      .replace(/[↕↑↓▲▼]/g, '')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();
  }

  function monitoringTables() {
    if (!isMonitoringContext()) return [];

    return Array.from(document.querySelectorAll('table')).filter((table) => {
      const headers = Array.from(table.querySelectorAll('thead th')).map((th) => normalizeHeader(text(th)));
      return headers.includes('file #') &&
        headers.includes('notes') &&
        (headers.includes('monitoring') || headers.includes('monitor status')) &&
        headers.includes('med expire');
    });
  }

  function indexes(table) {
    const headers = Array.from(table.querySelectorAll('thead th')).map((th) => normalizeHeader(text(th)));
    return {
      file: headers.indexOf('file #'),
      monitoring: headers.indexOf('monitoring') >= 0 ? headers.indexOf('monitoring') : headers.indexOf('monitor status'),
      mvr: headers.indexOf('order mvr') >= 0 ? headers.indexOf('order mvr') : (headers.indexOf('mvr status') >= 0 ? headers.indexOf('mvr status') : headers.indexOf('mvr')),
      medExpire: headers.indexOf('med expire'),
      notes: headers.indexOf('notes'),
      terminated: headers.indexOf('terminated')
    };
  }

  function fileNumberFromRow(row, index) {
    const raw = index >= 0 && row.children[index] ? text(row.children[index]) : '';
    const match = raw.match(/[0-9]+/);
    return match ? match[0] : '';
  }

  function rowNotes(row, notesIndex) {
    if (notesIndex < 0 || !row.children[notesIndex]) return '';
    const cell = row.children[notesIndex];
    const textarea = cell.querySelector('textarea');
    if (textarea) return textarea.value || '';
    const input = cell.querySelector('input');
    if (input) return input.value || '';
    return text(cell);
  }

  function rowMonitoring(row, idx) {
    if (idx.monitoring < 0 || !row.children[idx.monitoring]) return '';
    const select = row.children[idx.monitoring].querySelector('select');
    return select ? select.value : text(row.children[idx.monitoring]);
  }

  function rowMedDate(row, idx) {
    if (idx.medExpire < 0 || !row.children[idx.medExpire]) return null;
    const raw = text(row.children[idx.medExpire]);
    if (!raw) return null;
    const d = new Date(raw);
    if (Number.isNaN(d.getTime())) return null;
    return new Date(d.getFullYear(), d.getMonth(), d.getDate());
  }

  function today() {
    const d = new Date();
    return new Date(d.getFullYear(), d.getMonth(), d.getDate());
  }

  function isTerminatedRow(row) {
    if (row.hasAttribute('data-phase12a46-monitoring-hidden')) return true;
    if (row.hasAttribute('data-phase12a46-client-monitoring-hidden')) return true;
    const cb = row.querySelector('[data-phase12a45-terminated], [data-unterm]');
    return Boolean(cb && cb.checked);
  }

  async function saveTerminatedWithNotes(row, checked) {
    const table = row.closest('table');
    if (!table) return;
    const idx = indexes(table);
    const file = fileNumberFromRow(row, idx.file);
    const notes = rowNotes(row, idx.notes);

    const checkbox = row.querySelector('[data-phase12a45-terminated]');
    const idFromRow = row.dataset.applicantId || row.dataset.id;

    let id = idFromRow ? Number(idFromRow) : 0;

    if (!id && file) {
      try {
        const data = await api(isPortal() ? 'client-dashboard' : 'applicants');
        const rows = isPortal() ? (data.recentApplicants || []) : (data.applicants || []);
        const found = rows.find((item) => String(item.fileNumber) === String(file));
        id = Number(found?.id || 0);
      } catch {}
    }

    if (!id) return;

    const path = isPortal() ? 'client-applicant' : 'applicants';

    await api(path, {
      method: 'PATCH',
      body: JSON.stringify({ id, terminated: checked, notes })
    });

    row.dataset.phase12a47NotesSaved = '1';

    if (checked) {
      row.setAttribute(isPortal() ? 'data-phase12a46-client-monitoring-hidden' : 'data-phase12a46-monitoring-hidden', '');
    } else {
      row.removeAttribute('data-phase12a46-client-monitoring-hidden');
      row.removeAttribute('data-phase12a46-monitoring-hidden');
    }

    if (checkbox) checkbox.checked = checked;
  }

  function bindTerminatedCheckboxes() {
    monitoringTables().forEach((table) => {
      Array.from(table.querySelectorAll('tbody tr')).forEach((row) => {
        const checkbox = row.querySelector('[data-phase12a45-terminated]');
        if (!checkbox || checkbox.dataset.phase12a47Bound === '1') return;

        checkbox.dataset.phase12a47Bound = '1';

        checkbox.addEventListener('change', async () => {
          const checked = checkbox.checked;
          checkbox.disabled = true;

          try {
            await saveTerminatedWithNotes(row, checked);
            updateAlerts();
          } catch (error) {
            alert(error.message || 'Could not save terminated status and notes');
            checkbox.checked = !checked;
          } finally {
            checkbox.disabled = false;
          }
        }, true);
      });
    });
  }

  function countsForTable(table) {
    const idx = indexes(table);
    const out = { total: 0, on: 0, off: 0, expired: 0, exp30: 0, exp60: 0, blank: 0, mvr: 0 };

    Array.from(table.querySelectorAll('tbody tr')).forEach((row) => {
      if (isTerminatedRow(row)) return;

      const monitoring = rowMonitoring(row, idx);
      const medDate = rowMedDate(row, idx);
      const medRaw = idx.medExpire >= 0 && row.children[idx.medExpire] ? text(row.children[idx.medExpire]) : '';
      const mvrText = idx.mvr >= 0 && row.children[idx.mvr] ? text(row.children[idx.mvr]) : '';

      out.total++;
      if (monitoring === 'On') out.on++;
      else out.off++;

      if (monitoring === 'On') {
        if (!medRaw) out.blank++;
        else if (medDate) {
          const days = Math.ceil((medDate.getTime() - today().getTime()) / 86400000);
          if (days < 0) out.expired++;
          else if (days <= 30) out.exp30++;
          else if (days <= 60) out.exp60++;
        }

        if (/pending|review|needed|expired|attention/i.test(mvrText || '')) out.mvr++;
      }
    });

    return out;
  }

  function setCard(labelPart, value) {
    const cards = Array.from(document.querySelectorAll('button, .client-alert-card, [data-client-alert-filter]'));

    for (const card of cards) {
      const t = text(card).toLowerCase();
      if (!t.includes(labelPart.toLowerCase())) continue;

      const bold = card.querySelector('b');
      if (bold) bold.textContent = String(value);
      else {
        // Handles admin alert button structure.
        const first = card.firstElementChild;
        if (first) first.textContent = String(value);
      }
    }
  }

  function updateAlerts() {
    const table = monitoringTables()[0];
    if (!table) return;

    const c = countsForTable(table);

    setCard('Total', c.total);
    setCard('On Monitoring', c.on);
    setCard('Off Monitoring', c.off);
    setCard('Expired Medical', c.expired);
    setCard('Expiring 30 Days', c.exp30);
    setCard('Expiring 60 Days', c.exp60);
    setCard('Blank Med Expire', c.blank);
    setCard('MVR Attention', c.mvr);
  }

  function improveTerminatedPageNotes() {
    const title = currentTitle();
    if (title !== 'Terminated' && activePortalPage() !== 'term') return;

    // Terminated page tables already use notes from API. This just preserves visual formatting for longer notes.
    Array.from(document.querySelectorAll('table tbody tr')).forEach((row) => {
      const cells = Array.from(row.children);
      const maybeNotes = cells.find((cell) => text(cell).length > 40 && !cell.querySelector('a'));
      if (maybeNotes) maybeNotes.classList.add('phase12a47-notes-cell');
    });
  }

  function addStyles() {
    if (document.getElementById('phase12a47-style')) return;

    const style = document.createElement('style');
    style.id = 'phase12a47-style';
    style.textContent = `
      .phase12a47-notes-cell {
        max-width: 360px;
        white-space: normal;
        line-height: 1.35;
      }
    `;
    document.head.appendChild(style);
  }

  function boot() {
    addStyles();
    bindTerminatedCheckboxes();
    updateAlerts();
    improveTerminatedPageNotes();

    setInterval(() => {
      bindTerminatedCheckboxes();
      updateAlerts();
      improveTerminatedPageNotes();
    }, 900);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();

// Phase 12A-48: Stable terminated-aware alerts, no flashing
(function () {
  let activeFilter = 'all';

  function text(el) {
    return (el && el.textContent ? el.textContent : '').trim();
  }

  function esc(value) {

      .replaceAll('&', '&amp;')

      .replaceAll('"', '&quot;')

  }

    const active = Array.from(document.querySelectorAll('nav button')).find((button) => button.classList.contains('active'));
    return active ? active.dataset.p : '';
  }

  function isMonitoringContext() {
    const title = currentTitle();
    return title === 'Monitoring' || title === 'Client View' || activePortalPage() === 'mon';
  }

  function endpoint(path) {
    return '/api/index?path=' + encodeURIComponent(path);
  }

  async function api(path, options) {
    const res = await fetch(endpoint(path), Object.assign({ credentials: 'include' }, options || {}, {
      headers: Object.assign({ 'Content-Type': 'application/json' }, (options && options.headers) || {})
    }));
    const raw = await res.text();
    let data = {};
    try { data = raw ? JSON.parse(raw) : {}; } catch {}
    if (!res.ok) throw new Error(data.message || raw || 'Request failed');
    return data;
  }

  function normalizeHeader(value) {
    return String(value || '')
      .replace(/[↕↑↓▲▼]/g, '')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();
  }

  function monitoringTables() {
    if (!isMonitoringContext()) return [];

    return Array.from(document.querySelectorAll('table')).filter((table) => {
      const headers = Array.from(table.querySelectorAll('thead th')).map((th) => normalizeHeader(text(th)));
      return headers.includes('file #') &&
        headers.includes('notes') &&
        (headers.includes('monitoring') || headers.includes('monitor status')) &&
        headers.includes('med expire');
    });
  }

  function indexes(table) {
    const headers = Array.from(table.querySelectorAll('thead th')).map((th) => normalizeHeader(text(th)));
    return {
      file: headers.indexOf('file #'),
      name: headers.indexOf('name') >= 0 ? headers.indexOf('name') : headers.indexOf('applicant name'),
      monitoring: headers.indexOf('monitoring') >= 0 ? headers.indexOf('monitoring') : headers.indexOf('monitor status'),
      mvr: headers.indexOf('mvr status') >= 0 ? headers.indexOf('mvr status') : headers.indexOf('mvr'),
      medExpire: headers.indexOf('med expire'),
      notes: headers.indexOf('notes'),
      terminated: headers.indexOf('terminated')
    };
  }

  function cellValue(row, index) {
    if (index < 0 || !row.children[index]) return '';
    const cell = row.children[index];
    const select = cell.querySelector('select');
    if (select) return select.value || '';
    const textarea = cell.querySelector('textarea');
    if (textarea) return textarea.value || '';
    const input = cell.querySelector('input:not([type="checkbox"])');
    if (input) return input.value || '';
    return text(cell);

  function fileNumberFromRow(row, index) {
    const raw = cellValue(row, index);
    const match = raw.match(/[0-9]+/);
    return match ? match[0] : '';

    if (row.hasAttribute('data-phase12a46-monitoring-hidden')) return true;
    if (row.hasAttribute('data-phase12a46-client-monitoring-hidden')) return true;
    const cb = row.querySelector('[data-phase12a45-terminated], [data-unterm]');

    const monitoring = cellValue(row, idx.monitoring);
    const medRaw = cellValue(row, idx.medExpire);

    const mvrText = cellValue(row, idx.mvr);

    if (monitoring !== 'On') return 'off';
    if (!medRaw || !medDate) return 'blank';

    const days = Math.ceil((medDate.getTime() - today().getTime()) / 86400000);
    if (days < 0) return 'expired';
    if (days <= 30) return 'exp30';

  function rows(table) {

      if (status === 'mvr') out.mvr++;

  }

  function findOriginalAlertPanel(table) {

  function renderAdminAlertPanel(table) {
    if (isPortal()) return;

    const original = findOriginalAlertPanel(table);
    if (original) original.setAttribute('data-phase12a48-original-alerts', '1');

    let panel = document.getElementById('phase12a48-admin-alerts');

    if (!panel) {
      panel = document.createElement('section');
      panel.id = 'phase12a48-admin-alerts';
      panel.className = 'card phase12a48-admin-alerts';

      const tableCard = table.closest('.card, section') || table.parentElement;
      if (original && original.parentElement) original.parentElement.insertBefore(panel, original);
      else if (tableCard && tableCard.parentElement) tableCard.parentElement.insertBefore(panel, tableCard);
      else document.body.prepend(panel);
    }

    const c = counts(table);
    const signature = JSON.stringify({ c, activeFilter });

    if (panel.dataset.signature !== signature) {
      panel.dataset.signature = signature;
      panel.innerHTML = `
        <h3>Monitoring Alerts</h3>
        <div class="phase12a48-alert-grid">
          ${metric('all', c.total, 'Total')}
          ${metric('on', c.on, 'On Monitoring')}
          ${metric('off', c.off, 'Off Monitoring')}
          ${metric('expired', c.expired, 'Expired Medical')}
          ${metric('exp30', c.exp30, 'Expiring 30 Days')}
          ${metric('exp60', c.exp60, 'Expiring 60 Days')}
          ${metric('blank', c.blank, 'Blank Med Expire')}
          ${metric('mvr', c.mvr, 'MVR Attention')}
        </div>
        <div class="phase12a48-alert-actions">
          <button type="button" data-phase12a48-copy>Copy Summary</button>
          <button type="button" data-phase12a48-csv>Download Current View CSV</button>
          <button type="button" data-phase12a48-refresh>Recalculate Alerts</button>
        </div>
        <p class="phase12a48-help">Click an alert card to filter active Monitoring records. Terminated people are excluded.</p>
      `;

      panel.querySelectorAll('[data-phase12a48-filter]').forEach((button) => {
        button.addEventListener('click', () => {
          activeFilter = button.dataset.phase12a48Filter || 'all';
          renderAdminAlertPanel(table);
          applyFilter(table);
        });
      });

      panel.querySelector('[data-phase12a48-refresh]')?.addEventListener('click', () => {
        panel.dataset.signature = '';
        renderAdminAlertPanel(table);
        applyFilter(table);
      });

      panel.querySelector('[data-phase12a48-copy]')?.addEventListener('click', () => {
        const latest = counts(table);
        const summary = [
          'Monitoring Summary',
          `Total: ${latest.total}`,
          `On Monitoring: ${latest.on}`,
          `Off Monitoring: ${latest.off}`,
          `Expired Medical: ${latest.expired}`,
          `Expiring 30 Days: ${latest.exp30}`,
          `Expiring 60 Days: ${latest.exp60}`,
          `Blank Med Expire: ${latest.blank}`,
          `MVR Attention: ${latest.mvr}`
        ].join('\n');

        navigator.clipboard?.writeText(summary).catch(() => prompt('Copy summary:', summary));
      });

      panel.querySelector('[data-phase12a48-csv]')?.addEventListener('click', () => downloadCsv(table));
    }
  }

  function csvEscape(value) {
    const s = String(value ?? '');
    return /[",\n]/.test(s) ? `"${s.replaceAll('"', '""')}"` : s;
  }

  function downloadCsv(table) {
    const idx = indexes(table);
    const header = ['File #', 'Name', 'Monitoring', 'Med Expire', 'Notes'];
    const lines = [header.map(csvEscape).join(',')];

    rows(table)
      .filter((row) => !row.hasAttribute('data-phase12a48-alert-hidden') && !isTerminatedRow(row))
      .forEach((row) => {
        lines.push([
          cellValue(row, idx.file),
          cellValue(row, idx.name),
          cellValue(row, idx.monitoring),
          cellValue(row, idx.medExpire),
          cellValue(row, idx.notes)
        ].map(csvEscape).join(','));
      });

    const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'monitoring-current-view.csv';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  async function saveTerminatedWithNotes(row, checked) {
    const table = row.closest('table');
    if (!table) return;

    const idx = indexes(table);
    const file = fileNumberFromRow(row, idx.file);
    const notes = cellValue(row, idx.notes);
    let id = Number(row.dataset.applicantId || row.dataset.id || 0);

    if (!id && file) {
      try {
        const data = await api(isPortal() ? 'client-dashboard' : 'applicants');
        const list = isPortal() ? (data.recentApplicants || []) : (data.applicants || []);
        const found = list.find((item) => String(item.fileNumber) === String(file));
        id = Number(found?.id || 0);
      } catch {}
    }

    if (!id) throw new Error('Could not find applicant id for file ' + file);

    await api(isPortal() ? 'client-applicant' : 'applicants', {
      method: 'PATCH',
      body: JSON.stringify({ id, terminated: checked, notes })
    });

    row.toggleAttribute(isPortal() ? 'data-phase12a46-client-monitoring-hidden' : 'data-phase12a46-monitoring-hidden', checked);
    row.toggleAttribute('data-phase12a48-alert-hidden', checked);
  }

  function bindTerminatedCheckboxes() {
    monitoringTables().forEach((table) => {
      rows(table).forEach((row) => {
        const checkbox = row.querySelector('[data-phase12a45-terminated]');
        if (!checkbox || checkbox.dataset.phase12a48Bound === '1') return;

        checkbox.dataset.phase12a48Bound = '1';

        checkbox.addEventListener('change', async (event) => {
          event.preventDefault();
          event.stopImmediatePropagation();

          const checked = checkbox.checked;
          checkbox.disabled = true;

          try {
            await saveTerminatedWithNotes(row, checked);
            const t = row.closest('table');
            if (t) {
              applyFilter(t);
              renderAdminAlertPanel(t);
            }
          } catch (error) {
            alert(error.message || 'Could not save terminated status');
            checkbox.checked = !checked;
          } finally {
            checkbox.disabled = false;
          }
        }, true);
      });
    });
  }

  function refresh() {
    const table = monitoringTables()[0];

    if (!table) {
      document.getElementById('phase12a48-admin-alerts')?.remove();
      return;
    }

    bindTerminatedCheckboxes();

    if (!isPortal()) {
      renderAdminAlertPanel(table);
      applyFilter(table);
    }
  }

  function addStyles() {
    if (document.getElementById('phase12a48-style')) return;

    const style = document.createElement('style');
    style.id = 'phase12a48-style';
    style.textContent = `
      [data-phase12a48-original-alerts="1"] {
        display: none !important;
      }

      tr[data-phase12a48-alert-hidden] {
        display: none !important;
      }

      .phase12a48-admin-alerts {
        border-left: 5px solid #38bdf8;
        margin-bottom: 14px;
      }

      .phase12a48-admin-alerts h3 {
        margin: 0 0 10px;
      }

      .phase12a48-alert-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(150px, 1fr));
        gap: 10px;
      }

      .phase12a48-alert-card {
        text-align: left;
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 12px;
        padding: 10px 12px;
        color: #0f172a;
        cursor: pointer;
      }

      .phase12a48-alert-card b {
        display: block;
        font-size: 24px;
        line-height: 1;
      }

      .phase12a48-alert-card span {
        display: block;
        margin-top: 4px;
        font-weight: 900;
      }

      .phase12a48-alert-card.active {
        border-color: #1fff00;
        background: rgba(31, 255, 0, .16);
      }

      .phase12a48-alert-actions {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .phase12a48-alert-actions button {
        border: 1px solid #38bdf8;
        color: #075985;
        background: #f0f9ff;
        border-radius: 999px;
        padding: 8px 11px;
        font-weight: 1000;
        cursor: pointer;
      }

      .phase12a48-help {
        margin: 10px 0 0;
        color: #64748b;
        font-weight: 700;
      }

      @media(max-width:900px) {
        .phase12a48-alert-grid {
          grid-template-columns: repeat(2, minmax(140px, 1fr));
        }
      }
    `;

    document.head.appendChild(style);
  }

  function boot() {
    addStyles();
    refresh();

    // Slower refresh to detect page changes only.
    // Counts are rendered by one stable panel, so they do not flash.
    setInterval(refresh, 2500);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();

</script>
</body></html>
