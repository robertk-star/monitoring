<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>SaffHire Client Portal</title>
  <!-- Phase 12A-133: Dynamic Monitoring totals after edits, syncs, and new records -->
  <style>
    :root{--g:#1fff00;--ink:#0f172a;--muted:#64748b;--line:#dbe3ef;--bg:#f8fafc;--good:#166534;--bad:#991b1b;--warn:#92400e}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--ink)}
    .layout{min-height:100vh;display:grid;grid-template-columns:260px 1fr}aside{background:#0f172a;color:#fff;padding:22px 14px;position:sticky;top:0;height:100vh}.brand{padding:0 10px 18px;border-bottom:1px solid rgba(255,255,255,.14);margin-bottom:16px}.brand h1{margin:0;font-size:24px}.brand p{margin:5px 0 0;color:#cbd5e1;font-weight:700;font-size:13px}.nav-label{margin:18px 10px 8px;color:#94a3b8;font-size:11px;font-weight:1000;letter-spacing:.14em;text-transform:uppercase}nav button{width:100%;border:0;border-radius:13px;color:#e2e8f0;background:transparent;padding:11px;text-align:left;font-weight:900;cursor:pointer;margin:4px 0}nav button.active,nav button:hover{background:rgba(31,255,0,.16);box-shadow:inset 4px 0 0 var(--g);color:#fff}nav button[hidden]{display:none}main{padding:24px}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:18px}.head h2{margin:0 0 4px;font-size:28px}.head p{margin:0;color:var(--muted);font-weight:700}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 8px 24px rgba(15,23,42,.05)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px}.metric b{display:block;font-size:28px}.metric span{color:var(--muted);font-weight:800}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:15px;background:#fff}table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:10px;border-bottom:1px solid #e2e8f0;text-align:left;vertical-align:middle}th{background:#f8fafc;color:#475569;text-transform:uppercase;font-size:12px;white-space:nowrap}td{font-size:14px}.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.toolbar input,.toolbar select,input,select,textarea{border:1px solid #cbd5e1;border-radius:10px;padding:9px 10px;font:inherit;background:#fff}.toolbar input{min-width:260px;flex:1}textarea{width:260px;min-height:54px;resize:vertical}select.on{border-color:var(--g);background:rgba(31,255,0,.16);font-weight:1000}.btn{border:1px solid #16a34a;background:#ecfdf5;color:#166534;border-radius:999px;padding:9px 12px;font-weight:1000;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;justify-content:center}.btn:disabled{opacity:.55;cursor:not-allowed}.danger{border-color:#dc2626;background:#fef2f2;color:#991b1b}.neutral{border-color:#cbd5e1;background:#fff;color:#334155}.purple{border-color:#7c3aed;background:#f5f3ff;color:#5b21b6}.pill{display:inline-flex;border-radius:999px;padding:4px 9px;font-weight:900;font-size:12px;border:1px solid #cbd5e1}.pill.good{background:#ecfdf5;color:#166534;border-color:#bbf7d0}.pill.bad{background:#fef2f2;color:#991b1b;border-color:#fecaca}.pill.warn{background:#fffbeb;color:#92400e;border-color:#fde68a}.dirty td{background:#fffbeb!important}.hide{display:none!important}.toast{position:fixed;right:18px;bottom:18px;z-index:99999;background:#111827;color:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 18px 45px rgba(15,23,42,.25);max-width:460px}.toast.bad{background:#991b1b}.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;align-items:end}.form-grid label{font-weight:900;color:#334155;display:grid;gap:6px}.check{display:flex;align-items:center;gap:8px;font-weight:900;color:#334155}.empty{color:#64748b;font-weight:800}.small{font-size:12px;color:#64748b;font-weight:700}.role-note{color:#64748b;margin-top:8px}.status-completed{background:#ecfdf5;color:#166534;border-color:#bbf7d0}.status-open{background:#fff7ed;color:#9a3412;border-color:#fed7aa}.access-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px}.access-grid label{display:flex;gap:7px;align-items:center;font-size:12px;font-weight:900;color:#334155}.access-box{border:1px solid #dbe3ef;border-radius:14px;padding:10px;background:#f8fafc}.access-box legend{font-weight:1000;color:#0f172a;padding:0 6px}.terminated-access-option{border:1px solid #fed7aa;background:#fff7ed;border-radius:10px;padding:8px!important;color:#9a3412!important}.access-note{border:1px solid #fed7aa;background:#fff7ed;color:#9a3412;border-radius:14px;padding:10px 12px;margin-bottom:12px;font-weight:850}.access-note .btn{margin-left:10px}.terminated-cell{min-width:170px}.terminated-cell label{display:flex;gap:8px;align-items:center;font-weight:1000;color:#9a3412}.access-mini{border:1px solid #fed7aa;background:#fff7ed;border-radius:14px;padding:10px;margin-top:8px}.access-mini label{display:flex!important;gap:8px!important;align-items:center!important;font-weight:1000!important;color:#9a3412!important}@media(max-width:860px){.layout{grid-template-columns:1fr}aside{height:auto;position:relative}nav{display:flex;overflow:auto;gap:8px}nav button{white-space:nowrap}main{padding:14px}.head{display:block}.actions{justify-content:flex-start;margin-top:12px}.toolbar input{min-width:100%}textarea{width:220px}}
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand"><h1>SaffHire</h1><p id="client-name">Client Portal</p><p id="user-name"></p></div>
      <nav>
        <div class="nav-label">Client View</div>
        <button data-page="dashboard" class="active">Dashboard</button>
        <button data-page="monitoring">Monitoring</button>
        <button id="terminated-nav" data-page="terminated" hidden>Terminated</button>
        <button data-page="safety">Safety Reports</button>
        <div id="admin-label" class="nav-label" hidden>Admin</div>
        <button id="users-nav" data-page="users" hidden>User Admin / Access</button>
      </nav>
    </aside>
    <main><div id="app" class="card">Loading client portal...</div></main>
  </div>
<script>
(() => {
  const state = { page: 'dashboard', data: null, user: null, refreshPromise: null, lastRefreshAt: 0, autoRefreshTimer: null, monitoringChannel: null, filters: { monitoringSearch: '', monitoringStatus: 'active', terminatedSearch: '', safetySearch: '', safetyStatus: 'all' } };
  const app = document.getElementById('app');
  const clientName = document.getElementById('client-name');
  const userName = document.getElementById('user-name');
  const usersNav = document.getElementById('users-nav');
  const terminatedNav = document.getElementById('terminated-nav');
  const adminLabel = document.getElementById('admin-label');

  function esc(value) {
    return String(value ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
  }
  function endpoint(path) {
    const raw = String(path || '');
    const splitAt = raw.indexOf('?');
    if (splitAt === -1) return '/api/index?path=' + encodeURIComponent(raw);
    return '/api/index?path=' + encodeURIComponent(raw.slice(0, splitAt)) + '&' + raw.slice(splitAt + 1);
  }
  async function api(path, options = {}) {
    const headers = Object.assign({'Content-Type':'application/json'}, options.headers || {});
    const response = await fetch(endpoint(path), Object.assign({credentials:'include', cache:'no-store'}, options, {headers}));
    const raw = await response.text();
    let data = {};
    try { data = raw ? JSON.parse(raw) : {}; } catch {}
    if (!response.ok) throw new Error(data.message || raw || 'Request failed');
    return data;
  }
  function fmt(value) {
    if (!value) return '';
    const date = new Date(value);
    return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleDateString();
  }
  function toast(message, bad = false) {
    const el = document.createElement('div');
    el.className = bad ? 'toast bad' : 'toast';
    el.textContent = message;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
  function roleLabel(role) {
    return String(role || '').replaceAll('_', ' ').replace(/\b\w/g, c => c.toUpperCase());
  }
  const CLIENT_ACCESS_OPTIONS = [
    ['dashboard', 'Dashboard'],
    ['monitoring', 'Monitoring'],
    ['safetyReports', 'Safety Reports'],
    ['userAdmin', 'User Admin'],
    ['editMonitoring', 'Edit Monitoring'],
    ['terminated', 'Terminated Records']
  ];
  const DEFAULT_ACCESS = { dashboard: true, monitoring: true, safetyReports: true, userAdmin: true, editMonitoring: true, terminated: true };
  function normalizeAccess(access) { return Object.assign({}, DEFAULT_ACCESS, access || {}); }
  function canViewDashboard() { return Boolean(state.data?.canViewDashboard); }
  function canViewMonitoring() { return Boolean(state.data?.canViewMonitoring); }
  function canViewSafety() { return Boolean(state.data?.canViewSafety); }
  function canManageUsers() { return Boolean(state.data?.canManageUsers); }
  function canEditMonitoring() { return Boolean(state.data?.canEditMonitoring); }
  function canAccessTerminated() { return Boolean(state.data?.canAccessTerminated); }
  function canEditTerminated() { return Boolean(state.data?.canEditTerminated); }
  function canViewTerminated() { return canViewMonitoring() && canAccessTerminated(); }
  function isPageAllowed(page) {
    if (page === 'dashboard') return canViewDashboard();
    if (page === 'monitoring') return canViewMonitoring();
    if (page === 'terminated') return canViewTerminated();
    if (page === 'safety') return canViewSafety();
    if (page === 'users') return canManageUsers();
    return false;
  }
  function allowedPage(page) {
    if (isPageAllowed(page)) return page;
    return ['dashboard', 'monitoring', 'terminated', 'safety', 'users'].find(isPageAllowed) || 'none';
  }
  function updateNavVisibility() {
    document.querySelector('button[data-page="dashboard"]').hidden = !canViewDashboard();
    document.querySelector('button[data-page="monitoring"]').hidden = !canViewMonitoring();
    if (terminatedNav) terminatedNav.hidden = !canViewTerminated();
    document.querySelector('button[data-page="safety"]').hidden = !canViewSafety();
    usersNav.hidden = !canManageUsers();
    adminLabel.hidden = !canManageUsers();
  }
  function accessFields(access, mode) {
    const current = normalizeAccess(access);
    const checked = (key) => current[key] !== false ? 'checked' : '';
    return `<fieldset class="access-box client-access-options" data-client-access-box="true">
      <legend>${mode === 'row' ? 'Portal Sections' : 'Client Access'}</legend>
      <p class="small" style="margin-top:0">Choose the portal pages this user can open.</p>
      <div class="access-grid">
        <label><input type="checkbox" data-access-key="dashboard" ${checked('dashboard')}> Dashboard</label>
        <label><input type="checkbox" data-access-key="monitoring" ${checked('monitoring')}> Monitoring</label>
        <label><input type="checkbox" data-access-key="safetyReports" ${checked('safetyReports')}> Safety Reports</label>
        <label><input type="checkbox" data-access-key="userAdmin" ${checked('userAdmin')}> User Admin</label>
        <label><input type="checkbox" data-access-key="editMonitoring" ${checked('editMonitoring')}> Edit Monitoring</label>
      </div>
    </fieldset>`;
  }
  function terminatedAccessField(access) {
    const current = normalizeAccess(access);
    return `<div class="access-mini"><label><input type="checkbox" data-access-key="terminated" ${current.terminated !== false ? 'checked' : ''}> Terminated Records</label><p class="small" style="margin:6px 0 0">Allows this user to see terminated applicants and the Terminated field. To edit it, Edit Monitoring must also be checked.</p></div>`;
  }
  function readAccess(container) {
    const access = {};
    CLIENT_ACCESS_OPTIONS.forEach(([key]) => {
      const el = container.querySelector(`[data-access-key="${key}"]`);
      access[key] = Boolean(el?.checked);
    });
    return access;
  }

  function header(title, subtitle) {
    return `<div class="head"><div><h2>${esc(title)}</h2><p>${esc(subtitle || '')}</p></div><div class="actions"><button class="btn neutral" id="refresh-btn">Refresh</button><button class="btn danger" id="logout-btn">Logout</button></div></div>`;
  }
  function metric(label, value) {
    return `<div class="card metric"><b>${esc(value ?? 0)}</b><span>${esc(label)}</span></div>`;
  }
  function statusPill(status) {
    const raw = String(status || '');
    const cls = raw === 'Completed' ? 'status-completed' : 'status-open';
    return `<span class="pill ${cls}">${esc(raw || 'Open')}</span>`;
  }
  function monitoringPill(value) {
    return String(value || '') === 'On' ? '<span class="pill good">On</span>' : '<span class="pill bad">Off</span>';
  }
  function hasDirtyMonitoringRows() {
    return Boolean(app.querySelector('tr.dirty[data-id]'));
  }
  function bindHeaderButtons() {
    document.getElementById('refresh-btn')?.addEventListener('click', async () => {
      if (hasDirtyMonitoringRows() && !confirm('Refresh and discard the unsaved Monitoring changes on this page?')) return;
      await refreshPortalData({ showLoading: false, force: true, showToast: true });
    });
    document.getElementById('logout-btn')?.addEventListener('click', logout);
  }

  async function boot() {
    try {
      const me = await api('client-auth/me');
      state.user = me.user || null;
      await load();
    } catch (error) {
      location.href = '/client-login.html';
    }
  }
  function applyDashboardData(data) {
    state.data = data;
    state.user = state.data.user || state.user;
    state.lastRefreshAt = Date.now();
    clientName.textContent = state.data.company?.name || 'Client Portal';
    userName.textContent = state.user ? `${state.user.displayName || state.user.username} · ${roleLabel(state.user.role)}` : '';
    updateNavVisibility();
    state.page = allowedPage(state.page);
  }
  async function refreshPortalData({ showLoading = false, force = false, showToast = false } = {}) {
    if (state.refreshPromise) {
      const activeRefresh = state.refreshPromise;
      const result = await activeRefresh;
      if (force) return refreshPortalData({ showLoading: false, force: false, showToast });
      return result;
    }
    if (!force && hasDirtyMonitoringRows()) return false;

    state.refreshPromise = (async () => {
      if (showLoading) {
        app.className = 'card';
        app.textContent = 'Loading...';
      }
      try {
        const data = await api('client-dashboard');
        applyDashboardData(data);
        render();
        if (showToast) toast('Totals and records refreshed.');
        return true;
      } catch (error) {
        if (showLoading || !state.data) {
          app.className = 'card';
          app.innerHTML = `<h2>Could not load client portal</h2><p>${esc(error.message)}</p><p><button class="btn" id="retry-btn">Try Again</button></p>`;
          document.getElementById('retry-btn')?.addEventListener('click', load);
        } else if (showToast) {
          toast(error.message || 'Could not refresh totals and records.', true);
        }
        return false;
      } finally {
        state.refreshPromise = null;
      }
    })();

    return state.refreshPromise;
  }
  async function load() {
    return refreshPortalData({ showLoading: true, force: true });
  }
  async function logout() {
    await api('client-auth/logout', {method:'POST', body:'{}'}).catch(() => {});
    location.href = '/client-login.html';
  }
  function render() {
    updateNavVisibility();
    state.page = allowedPage(state.page);
    document.querySelectorAll('nav button[data-page]').forEach(btn => btn.classList.toggle('active', btn.dataset.page === state.page));
    if (state.page === 'none') {
      app.className = '';
      app.innerHTML = header('Client Portal', 'No portal sections are enabled for this account.') + '<section class="card"><p class="empty">Ask an admin to turn on Dashboard, Monitoring, or Safety Reports for this account.</p></section>';
      bindHeaderButtons();
      return;
    }
    if (state.page === 'monitoring') return renderMonitoring();
    if (state.page === 'terminated') return renderTerminated();
    if (state.page === 'safety') return renderSafety();
    if (state.page === 'users') return renderUsers();
    renderDashboard();
  }

  function recentApplicants() { return state.data?.recentApplicants || []; }
  function terminatedApplicants() {
    const rows = state.data?.terminatedApplicants;
    return Array.isArray(rows) ? rows : recentApplicants().filter(row => Boolean(row.terminated));
  }
  function recentSafety() { return state.data?.recentSafetyReports || []; }

  function renderDashboard() {
    if (!canViewDashboard()) {
      state.page = allowedPage('dashboard');
      if (state.page !== 'dashboard') return render();
    }
    const a = state.data?.applicantStats || {};
    const s = state.data?.safetyStats || {};
    const metricCards = [];
    const sections = [];
    if (canViewMonitoring()) {
      metricCards.push(metric('Total Monitoring', a.total), metric('On Monitoring', a.on_monitoring), metric('Off Monitoring', a.off_monitoring), metric('Med Cert Expired', a.expired_medical), metric('Med Cert 30 Days', a.expiring_30));
      sections.push(`<section class="card"><h3>Recent Monitoring</h3>${monitoringTable(recentApplicants().slice(0, 10), false)}</section>`);
    }
    if (canViewSafety()) {
      metricCards.push(metric('Safety Reports', s.total), metric('Open Safety', s.open), metric('Completed Safety', s.completed));
      sections.push(`<section class="card"><h3>Recent Safety Reports</h3>${safetyTable(recentSafety().slice(0, 10))}</section>`);
    }
    app.className = '';
    app.innerHTML = header('Dashboard', state.data?.company?.name || '') +
      (metricCards.length ? `<div class="grid">${metricCards.join('')}</div>` : '<section class="card"><p class="empty">No dashboard sections are enabled for this account.</p></section>') +
      sections.join('');
    bindHeaderButtons();
  }

  function monitoringMetricCards() {
    const a = state.data?.applicantStats || {};
    const cards = [
      metric('Total Monitoring', a.total),
      metric('On Monitoring', a.on_monitoring),
      metric('Off Monitoring', a.off_monitoring),
      metric('Med Cert Expired', a.expired_medical),
      metric('Med Cert 30 Days', a.expiring_30)
    ];
    if (canAccessTerminated()) cards.push(metric('Terminated', a.terminated));
    return `<div class="grid monitoring-total-grid">${cards.join('')}</div>`;
  }

  function matchesSearch(row, term, keys) {
    if (!term) return true;
    const haystack = keys.map(key => String(row[key] ?? '')).join(' ').toLowerCase();
    return haystack.includes(term.toLowerCase());
  }
  function monitoringRowsFiltered() {
    const term = state.filters.monitoringSearch;
    const status = state.filters.monitoringStatus;
    return recentApplicants().filter(row => {
      const terminated = Boolean(row.terminated);
      if (!canAccessTerminated() && terminated) return false;
      if (!canAccessTerminated() && status === 'terminated') return false;
      if (status === 'active' && terminated) return false;
      if (status === 'terminated' && !terminated) return false;
      if (status === 'on' && String(row.monitorStatus) !== 'On') return false;
      if (status === 'off' && String(row.monitorStatus) === 'On') return false;
      return matchesSearch(row, term, ['fileNumber', 'name', 'mvrStatus', 'notes', 'medExpire']);
    });
  }
  function monitoringTable(rows, edit) {
    if (!rows.length) return '<p class="empty">No monitoring records found.</p>';
    const showTerminatedColumn = canAccessTerminated();
    const terminatedHeader = showTerminatedColumn ? '<th>Terminated</th>' : '';
    return `<div class="table-wrap"><table><thead><tr><th>File #</th><th>Name</th><th>Order Date</th><th>Monitoring</th><th>MVR Status</th><th>Med Expire</th><th>Notes</th>${terminatedHeader}${edit ? '<th>Save</th>' : ''}</tr></thead><tbody>${rows.map(row => {
      const editable = edit && canEditMonitoring();
      const terminatedCell = showTerminatedColumn ? `<td>${editable && canEditTerminated() ? `<label class="check"><input type="checkbox" data-field="terminated" ${row.terminated ? 'checked' : ''}> Yes</label>` : (row.terminated ? '<span class="pill warn">Yes</span>' : '<span class="pill good">No</span>')}</td>` : '';
      return `<tr data-id="${esc(row.id)}"><td><b>${esc(row.fileNumber)}</b></td><td>${esc(row.name)}</td><td>${esc(fmt(row.orderDate))}</td><td>${editable ? `<select data-field="monitorStatus" class="${row.monitorStatus === 'On' ? 'on' : ''}"><option value="Off" ${row.monitorStatus !== 'On' ? 'selected' : ''}>Off</option><option value="On" ${row.monitorStatus === 'On' ? 'selected' : ''}>On</option></select>` : monitoringPill(row.monitorStatus)}</td><td>${esc(row.mvrStatus)}</td><td>${esc(row.medExpire)}</td><td>${editable ? `<textarea data-field="notes">${esc(row.notes || '')}</textarea>` : esc(row.notes)}</td>${terminatedCell}${editable ? '<td><button class="btn" data-action="save-monitoring">Save</button></td>' : ''}</tr>`;
    }).join('')}</tbody></table></div>`;
  }
  function renderMonitoring() {
    if (!canViewMonitoring()) {
      app.className = '';
      app.innerHTML = header('Monitoring', 'Access not enabled.') + '<section class="card"><p class="empty">This account does not have Monitoring access.</p></section>';
      bindHeaderButtons();
      return;
    }
    if (!canAccessTerminated() && (state.filters.monitoringStatus === 'terminated' || state.filters.monitoringStatus === 'all')) state.filters.monitoringStatus = 'active';
    const rows = monitoringRowsFiltered();
    const statusOptions = [
      `<option value="active" ${state.filters.monitoringStatus === 'active' ? 'selected' : ''}>Active only</option>`,
      canAccessTerminated() ? `<option value="all" ${state.filters.monitoringStatus === 'all' ? 'selected' : ''}>All records</option>` : '',
      `<option value="on" ${state.filters.monitoringStatus === 'on' ? 'selected' : ''}>Monitoring On</option>`,
      `<option value="off" ${state.filters.monitoringStatus === 'off' ? 'selected' : ''}>Monitoring Off</option>`,
      canAccessTerminated() ? `<option value="terminated" ${state.filters.monitoringStatus === 'terminated' ? 'selected' : ''}>Terminated only</option>` : ''
    ].join('');
    const subtitle = canEditMonitoring()
      ? (canEditTerminated() ? 'Client-scoped Monitoring records. You can update Monitoring status, notes, and terminated status.' : 'Client-scoped Monitoring records. You can update Monitoring status and notes.')
      : 'Read-only client-scoped Monitoring records.';
    app.className = '';
    app.innerHTML = header('Monitoring', subtitle) +
      monitoringMetricCards() +
      `<section class="card"><div class="toolbar"><input id="monitoring-search" type="search" placeholder="Search by file number, name, status, notes..." value="${esc(state.filters.monitoringSearch)}"><select id="monitoring-filter">${statusOptions}</select>${canEditMonitoring() ? '<button class="btn" id="save-all-monitoring">Save All Changed</button>' : ''}<span class="small">Showing ${rows.length} of ${recentApplicants().length}</span></div>${monitoringTable(rows, true)}</section>`;
    bindHeaderButtons();
    document.getElementById('monitoring-search')?.addEventListener('input', event => { state.filters.monitoringSearch = event.target.value; renderMonitoring(); });
    document.getElementById('monitoring-filter')?.addEventListener('change', event => { state.filters.monitoringStatus = event.target.value; renderMonitoring(); });
    document.getElementById('save-all-monitoring')?.addEventListener('click', saveAllMonitoring);
    app.querySelectorAll('tr[data-id]').forEach(row => {
      row.querySelectorAll('select, textarea, input[type="checkbox"]').forEach(el => {
        el.addEventListener('input', () => row.classList.add('dirty'));
        el.addEventListener('change', () => row.classList.add('dirty'));
      });
      row.querySelector('[data-action="save-monitoring"]')?.addEventListener('click', () => saveMonitoringRow(row));
    });
  }
  function renderTerminated() {
    if (!canViewTerminated()) {
      app.className = '';
      app.innerHTML = header('Terminated', 'Access not enabled.') + '<section class="card"><p class="empty">This account does not have Terminated Records access.</p></section>';
      bindHeaderButtons();
      return;
    }
    const term = String(state.filters.terminatedSearch || '').trim();
    const rows = terminatedApplicants().filter(row => matchesSearch(row, term, ['fileNumber', 'name', 'mvrStatus', 'notes', 'medExpire']));
    const subtitle = canEditTerminated()
      ? 'Terminated Monitoring records. You can update Monitoring status, notes, and terminated status.'
      : 'Read-only terminated Monitoring records.';
    app.className = '';
    app.innerHTML = header('Terminated', subtitle) +
      `<section class="card"><div class="toolbar"><input id="terminated-search" type="search" placeholder="Search terminated by file number, name, status, notes..." value="${esc(state.filters.terminatedSearch)}"><span class="small">Showing ${rows.length} terminated record${rows.length === 1 ? '' : 's'}</span></div>${monitoringTable(rows, true)}</section>`;
    bindHeaderButtons();
    document.getElementById('terminated-search')?.addEventListener('input', event => { state.filters.terminatedSearch = event.target.value; renderTerminated(); });
    app.querySelectorAll('tr[data-id]').forEach(row => {
      row.querySelectorAll('select, textarea, input[type="checkbox"]').forEach(el => {
        el.addEventListener('input', () => row.classList.add('dirty'));
        el.addEventListener('change', () => row.classList.add('dirty'));
      });
      row.querySelector('[data-action="save-monitoring"]')?.addEventListener('click', () => saveMonitoringRow(row));
    });
  }

  function signalMonitoringDataChanged(reason, details = {}) {
    const payload = { reason, details, at: Date.now() };
    try { localStorage.setItem('saffhire-monitoring-data-changed', JSON.stringify(payload)); } catch {}
    try {
      const channel = new BroadcastChannel('saffhire-monitoring-updates');
      channel.postMessage(payload);
      channel.close();
    } catch {}
  }
  async function saveMonitoringRow(row, { refreshAfterSave = true, signalAfterSave = true } = {}) {
    const button = row.querySelector('[data-action="save-monitoring"]');
    const old = button?.textContent || 'Save';
    if (button) { button.disabled = true; button.textContent = 'Saving...'; }
    try {
      const payload = {
        id: Number(row.dataset.id),
        monitorStatus: row.querySelector('[data-field="monitorStatus"]')?.value || 'Off',
        notes: row.querySelector('[data-field="notes"]')?.value || ''
      };
      if (canEditTerminated()) payload.terminated = Boolean(row.querySelector('[data-field="terminated"]')?.checked);
      const result = await api('client-applicant', {method:'PATCH', body: JSON.stringify(payload)});
      const index = recentApplicants().findIndex(item => Number(item.id) === Number(payload.id));
      if (index >= 0 && result.applicant) state.data.recentApplicants[index] = result.applicant;
      row.classList.remove('dirty');
      if (signalAfterSave) signalMonitoringDataChanged('client-monitoring-edit', { applicantId: payload.id });
      const notification = result.monitoringNotification || {};
      if (notification.attempted && Number(notification.sent || 0) > 0) {
        toast(`Monitoring record saved. Notification email sent to ${notification.sent} recipient${Number(notification.sent) === 1 ? '' : 's'}.`);
      } else if (notification.attempted && Number(notification.failed || 0) > 0) {
        toast(`Monitoring record saved, but the notification email failed: ${notification.message || 'Unknown email error'}`, true);
      } else if (notification.message && notification.message !== 'Monitoring status did not change') {
        toast(`Monitoring record saved. Email notice not sent: ${notification.message}`, true);
      } else {
        toast('Monitoring record saved.');
      }
      if (refreshAfterSave) await refreshPortalData({ force: true });
      return true;
    } catch (error) {
      toast(error.message || 'Could not save monitoring record.', true);
      return false;
    } finally {
      if (button && button.isConnected) { button.disabled = false; button.textContent = old; }
    }
  }
  async function saveAllMonitoring() {
    const dirtyRows = Array.from(app.querySelectorAll('tr.dirty[data-id]'));
    if (!dirtyRows.length) return toast('No changes to save.');
    let saved = 0;
    for (const row of dirtyRows) {
      if (await saveMonitoringRow(row, { refreshAfterSave: false, signalAfterSave: false })) saved += 1;
    }
    if (saved > 0) {
      signalMonitoringDataChanged('client-monitoring-bulk-edit', { saved });
      await refreshPortalData({ force: true });
    }
  }

  function safetyRowsFiltered() {
    const term = state.filters.safetySearch;
    const status = state.filters.safetyStatus;
    return recentSafety().filter(row => {
      if (status !== 'all' && String(row.status || '') !== status) return false;
      return matchesSearch(row, term, ['fileNumber', 'applicantName', 'status', 'prevEmployerName', 'notes']);
    });
  }
  function safetyTable(rows) {
    if (!rows.length) return '<p class="empty">No safety reports found.</p>';
    return `<div class="table-wrap"><table><thead><tr><th>File #</th><th>Applicant</th><th>Created</th><th>Status</th><th>Previous Employer</th><th>Client Notes</th><th>PDF</th></tr></thead><tbody>${rows.map(row => `<tr><td><b>${esc(row.fileNumber)}</b></td><td>${esc(row.applicantName)}</td><td>${esc(fmt(row.created))}</td><td>${statusPill(row.status)}</td><td>${esc(row.prevEmployerName)}</td><td>${esc(row.notes)}</td><td>${String(row.status || '') === 'Completed' ? `<button class="btn purple" data-action="download-pdf" data-id="${esc(row.id)}">Download PDF</button>` : '<span class="small">Available when completed</span>'}</td></tr>`).join('')}</tbody></table></div>`;
  }
  function renderSafety() {
    if (!canViewSafety()) {
      app.className = '';
      app.innerHTML = header('Safety Reports', 'Access not enabled.') + '<section class="card"><p class="empty">This account does not have Safety Reports access.</p></section>';
      bindHeaderButtons();
      return;
    }
    const rows = safetyRowsFiltered();
    const statuses = ['all','Consent Needed','Consent Given','S1 Complete','Emp Sent','Emp Complete','Completed'];
    app.className = '';
    app.innerHTML = header('Safety Reports', 'Read-only client-scoped Safety Performance reports.') +
      `<section class="card"><div class="toolbar"><input id="safety-search" type="search" placeholder="Search by file number, applicant, employer, notes..." value="${esc(state.filters.safetySearch)}"><select id="safety-filter">${statuses.map(status => `<option value="${esc(status)}" ${state.filters.safetyStatus === status ? 'selected' : ''}>${esc(status === 'all' ? 'All statuses' : status)}</option>`).join('')}</select><span class="small">Showing ${rows.length} of ${recentSafety().length}</span></div>${safetyTable(rows)}</section>`;
    bindHeaderButtons();
    document.getElementById('safety-search')?.addEventListener('input', event => { state.filters.safetySearch = event.target.value; renderSafety(); });
    document.getElementById('safety-filter')?.addEventListener('change', event => { state.filters.safetyStatus = event.target.value; renderSafety(); });
    app.querySelectorAll('[data-action="download-pdf"]').forEach(button => button.addEventListener('click', () => downloadSafetyPdf(button.dataset.id)));
  }
  function downloadSafetyPdf(id) {
    if (!id) return toast('Safety report id is missing.', true);
    window.open(endpoint('client-safety-pdf?id=' + encodeURIComponent(id)), '_blank', 'noopener');
  }

  async function renderUsers() {
    if (!canManageUsers()) {
      app.className = '';
      app.innerHTML = header('User Admin', 'Client admin access required.') + '<section class="card"><p class="empty">Your account does not have access to manage users.</p></section>';
      bindHeaderButtons();
      return;
    }
    app.className = '';
    app.innerHTML = header('User Admin', 'Add and manage users created inside this client account.') + '<section class="card">Loading users...</section>';
    bindHeaderButtons();
    try {
      const result = await api('client-users');
      const users = result.users || [];
      const roleOptions = state.user?.role === 'admin'
        ? ['client_admin', 'client_user', 'viewer', 'user']
        : ['client_user', 'viewer'];
      app.innerHTML = header('User Admin / Access', 'Only users created inside this client account appear here. SaffHire-created accounts remain hidden.') +
        `<section class="card"><h3>Add Client User</h3><form id="add-user-form" class="form-grid"><label>Display Name<input name="displayName" autocomplete="off"></label><label>Email / Username<input name="username" required autocomplete="off"></label><label>Temporary Password<input name="password" required minlength="8" type="password"></label><label>Role<select name="role">${roleOptions.map(role => `<option value="${role}">${roleLabel(role)}</option>`).join('')}</select></label><div style="grid-column:1/-1">${accessFields(DEFAULT_ACCESS, 'add')}${terminatedAccessField(DEFAULT_ACCESS)}</div><button class="btn">Add User</button></form><p class="role-note">Terminated Records is now shown as its own control so it is not missed. To let a user change Terminated, also check Edit Monitoring.</p></section>` +
        `<section class="card"><h3>Client-Created Users</h3><p class="small">Accounts created by SaffHire in the master admin remain available for login but are not shown or editable here.</p>${usersTable(users, roleOptions)}</section>`;
      bindHeaderButtons();
      bindUsers(roleOptions);
    } catch (error) {
      app.innerHTML = header('User Admin', '') + `<section class="card"><p class="empty">${esc(error.message)}</p></section>`;
      bindHeaderButtons();
    }
  }
  function usersTable(users, roleOptions) {
    if (!users.length) return '<p class="empty">No users have been created by this client yet.</p>';
    return `<div class="table-wrap"><table><thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Access</th><th>Terminated Records</th><th>Status</th><th>Last Sign In</th><th>Actions</th></tr></thead><tbody>${users.map(user => `<tr data-user-id="${esc(user.id)}"><td><input data-field="displayName" value="${esc(user.displayName || '')}"></td><td>${esc(user.username)}</td><td><select data-field="role">${roleOptions.map(role => `<option value="${role}" ${user.role === role ? 'selected' : ''}>${roleLabel(role)}</option>`).join('')}</select></td><td>${accessFields(user.clientAccess, 'row')}</td><td class="terminated-cell">${terminatedAccessField(user.clientAccess)}</td><td><select data-field="isActive"><option value="true" ${user.isActive !== false ? 'selected' : ''}>Active</option><option value="false" ${user.isActive === false ? 'selected' : ''}>Inactive</option></select></td><td>${esc(user.lastSignedIn ? new Date(user.lastSignedIn).toLocaleString() : '')}</td><td><button class="btn" data-action="save-user">Save</button> <button class="btn neutral" data-action="reset-user">Reset Password</button> <button class="btn danger" data-action="delete-user">Delete</button></td></tr>`).join('')}</tbody></table></div>`;
  }
  function bindUsers(roleOptions) {
    document.getElementById('add-user-form')?.addEventListener('submit', async event => {
      event.preventDefault();
      const body = Object.fromEntries(new FormData(event.target).entries());
      body.clientAccess = readAccess(event.target);
      try {
        await api('client-users', {method:'POST', body: JSON.stringify(body)});
        toast('Client user added.');
        await load();
        state.page = 'users';
        renderUsers();
      } catch (error) { toast(error.message, true); }
    });
    app.querySelectorAll('tr[data-user-id]').forEach(row => {
      row.querySelector('[data-action="save-user"]')?.addEventListener('click', async () => {
        try {
          await api('client-users', {method:'PATCH', body: JSON.stringify({
            id: Number(row.dataset.userId),
            displayName: row.querySelector('[data-field="displayName"]').value,
            role: row.querySelector('[data-field="role"]').value,
            isActive: row.querySelector('[data-field="isActive"]').value === 'true',
            clientAccess: readAccess(row)
          })});
          toast('User saved.');
          await load();
          state.page = 'users';
          renderUsers();
        } catch (error) { toast(error.message, true); }
      });
      row.querySelector('[data-action="reset-user"]')?.addEventListener('click', async () => {
        const password = prompt('New temporary password, at least 8 characters:');
        if (!password) return;
        try {
          await api('client-users', {method:'PATCH', body: JSON.stringify({ id: Number(row.dataset.userId), password })});
          toast('Temporary password updated.');
          await load();
          state.page = 'users';
          renderUsers();
        } catch (error) { toast(error.message, true); }
      });
      row.querySelector('[data-action="delete-user"]')?.addEventListener('click', async () => {
        if (!confirm('Delete this client user?')) return;
        try {
          await api('client-users?id=' + encodeURIComponent(row.dataset.userId), {method:'DELETE'});
          toast('Client user deleted.');
          await load();
          state.page = 'users';
          renderUsers();
        } catch (error) { toast(error.message, true); }
      });
    });
  }

  function shouldAutoRefreshMonitoringData() {
    return document.visibilityState === 'visible' && ['dashboard', 'monitoring', 'terminated'].includes(state.page) && !hasDirtyMonitoringRows();
  }
  function queueAutomaticRefresh(forceFresh = false) {
    if (!state.data || !shouldAutoRefreshMonitoringData()) return;
    if (!forceFresh && Date.now() - state.lastRefreshAt < 5000) return;
    refreshPortalData({ force: false }).catch(() => {});
  }
  function startAutomaticRefresh() {
    if (!state.autoRefreshTimer) state.autoRefreshTimer = setInterval(() => queueAutomaticRefresh(false), 30000);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') queueAutomaticRefresh(false);
    });
    window.addEventListener('focus', () => queueAutomaticRefresh(false));
    window.addEventListener('storage', event => {
      if (event.key === 'saffhire-monitoring-data-changed') queueAutomaticRefresh(true);
    });
    window.addEventListener('saffhire:monitoring-data-changed', () => queueAutomaticRefresh(true));
    try {
      state.monitoringChannel = new BroadcastChannel('saffhire-monitoring-updates');
      state.monitoringChannel.addEventListener('message', () => queueAutomaticRefresh(true));
    } catch {}
  }

  document.querySelectorAll('nav button[data-page]').forEach(button => {
    button.addEventListener('click', () => {
      state.page = allowedPage(button.dataset.page);
      render();
      queueAutomaticRefresh();
    });
  });
  startAutomaticRefresh();
  boot();
})();
</script>
</body>
</html>
