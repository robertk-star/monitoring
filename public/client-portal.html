<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SaffHire Client Portal</title><style>:root{--g:#1fff00;--ink:#0f172a;--muted:#64748b;--line:#dbe3ef;--bg:#f8fafc}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--ink)}.layout{min-height:100vh;display:grid;grid-template-columns:260px 1fr}aside{background:#0f172a;color:#fff;padding:22px 14px}.brand{padding:0 10px 18px;border-bottom:1px solid rgba(255,255,255,.14);margin-bottom:16px}.brand h1{margin:0}.brand p{margin:4px 0 0;color:#cbd5e1}nav button{width:100%;border:0;border-radius:13px;color:#e2e8f0;background:transparent;padding:11px;text-align:left;font-weight:900;cursor:pointer;margin:4px 0}nav button.active,nav button:hover{background:rgba(31,255,0,.16);box-shadow:inset 4px 0 0 var(--g);color:#fff}main{padding:24px}.head{display:flex;justify-content:space-between;gap:12px;margin-bottom:18px}.head h2{margin:0 0 4px;font-size:28px}.head p{margin:0;color:var(--muted);font-weight:700}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 8px 24px rgba(15,23,42,.05)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}.metric b{display:block;font-size:28px}.metric span{color:var(--muted);font-weight:800}.table{overflow:auto;border:1px solid var(--line);border-radius:15px}table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:10px;border-bottom:1px solid #e2e8f0;text-align:left;vertical-align:middle}th{background:#f8fafc;color:#475569;text-transform:uppercase;font-size:12px}select,textarea{border:1px solid #cbd5e1;border-radius:10px;padding:8px;font:inherit}textarea{width:260px;min-height:54px}select.on{border-color:var(--g);background:rgba(31,255,0,.16);font-weight:1000}tr.dirty td{background:#fffbeb}.btn{border:1px solid #16a34a;background:#ecfdf5;color:#166534;border-radius:999px;padding:9px 12px;font-weight:1000;cursor:pointer}.danger{border-color:#dc2626;background:#fef2f2;color:#991b1b}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:#fff;border-radius:12px;padding:12px 14px}.toast.bad{background:#991b1b}@media(max-width:860px){.layout{grid-template-columns:1fr}nav{display:flex;overflow:auto;gap:8px}nav button{white-space:nowrap}}</style></head><body><div class="layout"><aside><div class="brand"><h1>SaffHire</h1><p id="name">Client Portal</p></div><nav><button data-p="dash" class="active">Dashboard</button><button data-p="mon">Monitoring</button><button data-p="safe">Safety Performance</button></nav></aside><main><div id="app" class="card">Loading client portal...</div></main></div><script>let S={p:'dash',d:null};const A=document.getElementById('app');function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}function fmt(v){if(!v)return'';const d=new Date(v);return Number.isNaN(d.getTime())?String(v):d.toLocaleDateString()}function ep(p){return'/api/index?path='+encodeURIComponent(p)}async function api(p,o){const r=await fetch(ep(p),Object.assign({credentials:'include'},o||{},{headers:Object.assign({'Content-Type':'application/json'},(o&&o.headers)||{})}));const raw=await r.text();let d={};try{d=raw?JSON.parse(raw):{}}catch{}if(!r.ok)throw new Error(d.message||raw||'Request failed');return d}function toast(m,b){let t=document.createElement('div');t.className=b?'toast bad':'toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3500)}function head(t,s){return`<div class=head><div><h2>${esc(t)}</h2><p>${esc(s||'')}</p></div><div><button class=btn onclick=load()>Refresh</button> <button class='btn danger' onclick=logout()>Logout</button></div></div>`}function metric(l,v){return`<div class='card metric'><b>${esc(v??0)}</b><span>${esc(l)}</span></div>`}async function boot(){try{await api('client-auth/me');await load()}catch(e){location.href='/client-login.html'}}async function load(){A.innerHTML='Loading...';try{S.d=await api('client-dashboard');document.getElementById('name').textContent=S.d.company?.name||'Client Portal';render()}catch(e){A.className='card';A.textContent=e.message}}async function logout(){await api('client-auth/logout',{method:'POST',body:'{}'}).catch(()=>{});location.href='/client-login.html'}function render(){document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.p===S.p));if(S.p==='mon')return mon();if(S.p==='safe')return safe();dash()}function dash(){let d=S.d||{},a=d.applicantStats||{},s=d.safetyStats||{};A.className='';A.innerHTML=head('Dashboard',d.company?.name||'')+`<div class=grid>${metric('Total Monitoring',a.total)}${metric('On Monitoring',a.on_monitoring)}${metric('Off Monitoring',a.off_monitoring)}${metric('Expired Medical',a.expired_medical)}${metric('Safety Reports',s.total)}${metric('Completed Safety',s.completed)}</div><section class=card><h3>Recent Monitoring</h3>${monTable((d.recentApplicants||[]).slice(0,10),false)}</section><section class=card><h3>Recent Safety Performance</h3>${safeTable((d.recentSafetyReports||[]).slice(0,10))}</section>`}function monTable(rows,edit){if(!rows.length)return'<p>No monitoring records found.</p>';return`<div class=table><table><thead><tr><th>File #</th><th>Name</th><th>Order Date</th><th>Monitoring</th><th>MVR Status</th><th>Med Expire</th><th>Notes</th>${edit?'<th>Save</th>':''}</tr></thead><tbody>${rows.map(r=>`<tr data-id='${esc(r.id)}'><td><b>${esc(r.fileNumber)}</b></td><td>${esc(r.name)}</td><td>${esc(fmt(r.orderDate))}</td><td>${edit?`<select data-f=monitorStatus class='${r.monitorStatus==='On'?'on':''}'><option value=Off ${r.monitorStatus!=='On'?'selected':''}>Off</option><option value=On ${r.monitorStatus==='On'?'selected':''}>On</option></select>`:esc(r.monitorStatus)}</td><td>${esc(r.mvrStatus)}</td><td>${esc(r.medExpire)}</td><td>${edit?`<textarea data-f=notes>${esc(r.notes||'')}</textarea>`:esc(r.notes)}</td>${edit?'<td><button class=btn data-a=save>Save</button></td>':''}</tr>`).join('')}</tbody></table></div>`}function mon(){let rows=S.d?.recentApplicants||[];A.className='';A.innerHTML=head('Monitoring','Turn Monitoring On/Off and save notes.')+`<section class=card><button class=btn onclick=saveAll()>Save All Changed</button><br><br>${monTable(rows,true)}</section>`;document.querySelectorAll('[data-id]').forEach(row=>{row.querySelectorAll('select,textarea').forEach(el=>el.addEventListener('change',()=>row.classList.add('dirty')));row.querySelector('[data-a=save]')?.addEventListener('click',()=>saveRow(row))})}async function saveRow(row){let b=row.querySelector('[data-a=save]');let old=b.textContent;b.disabled=true;b.textContent='Saving...';try{await api('client-applicant',{method:'PATCH',body:JSON.stringify({id:row.dataset.id,monitorStatus:row.querySelector('[data-f=monitorStatus]').value,notes:row.querySelector('[data-f=notes]').value})});row.classList.remove('dirty');row.querySelector('select').classList.toggle('on',row.querySelector('select').value==='On');toast('Saved.')}catch(e){toast(e.message,true)}finally{b.disabled=false;b.textContent=old}}async function saveAll(){let rows=[...document.querySelectorAll('tr.dirty[data-id]')];if(!rows.length)return toast('No changes to save.');for(const r of rows)await saveRow(r);await load()}function safeTable(rows){if(!rows.length)return'<p>No safety reports found.</p>';return`<div class=table><table><thead><tr><th>File #</th><th>Applicant</th><th>Created</th><th>Status</th><th>Follow Up</th><th>Previous Employer</th><th>Notes</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.fileNumber)}</td><td>${esc(r.applicantName)}</td><td>${esc(fmt(r.created))}</td><td>${esc(r.status)}</td><td>${esc(r.followUpDate)}</td><td>${esc(r.prevEmployerName)}</td><td>${esc(r.notes)}</td></tr>`).join('')}</tbody></table></div>`}function safe(){A.className='';A.innerHTML=head('Safety Performance','Read-only Safety Performance reports.')+`<section class=card>${safeTable(S.d?.recentSafetyReports||[])}</section>`}document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{S.p=b.dataset.p;render()});boot();</script></body></html>
