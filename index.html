<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>SaffHire Monitoring</title><link rel="stylesheet" href="/phase4.css" /></head>
  <body>
    <div id="root"></div>
    <script>
      window.__saffhireOriginalFetch = window.fetch.bind(window);
      window.fetch = function(input, init) {
        let url = typeof input === 'string' ? input : input && input.url;
        if (typeof url === 'string' && url.startsWith('/api/') && !url.startsWith('/api/index') && !url.startsWith('/api/safety-response-link') && !url.startsWith('/api/safety-response') && !url.startsWith('/api/fmcsa-packet') && !url.startsWith('/api/pdf-medical')) {
          const parts = url.split('?');
          const routePath = parts[0].replace(/^\/api\/?/, '');
          const query = parts[1] ? '&' + parts[1] : '';
          const nextUrl = '/api/index?path=' + encodeURIComponent(routePath) + query;
          if (typeof input === 'string') return window.__saffhireOriginalFetch(nextUrl, init);
          input = new Request(nextUrl, input);
        }
        return window.__saffhireOriginalFetch(input, init);
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>

  </body>
